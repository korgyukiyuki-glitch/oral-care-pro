function ManagementPlan({ patient, assessment, onSave, onBack, onPrint, onReferral, mode }) {
  const [plans, setPlans] = useState(() => {
    if (mode === 'kaika') {
      const initial = {};
      Object.keys(assessment.kaikaItems || {}).forEach(code => {
        const item = assessment.kaikaItems[code];
        if (item.positive) {
          const tmpl = PLAN_TEMPLATES_KAIKA[code] || { problem:'', plan:'' };
          initial[code] = { problem: tmpl.problem, plan: tmpl.plan };
        }
      });
      return initial;
    }
    const initial = {};
    Object.entries(assessment.checks || {}).forEach(([code, val]) => {
      const isChecked = code === 'C11' ? (val && val.length > 0) : code === 'C13' ? (val === 'underweight' || val === 'overweight') : code === 'C17' ? (val && val.length > 0) : val === true;
      if (isChecked && PLAN_TEMPLATES[code]) {
        initial[code] = assessment.plans?.[code] || { ...PLAN_TEMPLATES[code] };
      }
    });
    return initial;
  });
  const [overallPlan, setOverallPlan] = useState(() => {
    if (assessment.overallPlan) return assessment.overallPlan;
    const codes = Object.keys(plans);
    const lines = [];
    const has = (arr) => arr.some(c => codes.includes(c));
    if (has(['C1','C2','C3','C4','C5','C6'])) lines.push('噛む機能の改善と咬合育成を行います。');
    if (has(['C7','C9','C12'])) lines.push('舌の機能訓練（MFT）を実施します。');
    if (has(['C10'])) lines.push('口唇閉鎖力の改善訓練を行います。');
    if (has(['C14','C15','C16'])) lines.push('鼻呼吸への改善指導を行い、必要に応じて耳鼻科受診のご案内や上あごを広げる装置をご提案します。');
    if (has(['C11'])) lines.push('口腔習癖の除去指導を行います。');
    if (has(['C8'])) lines.push('食事・間食指導を行います。');
    if (has(['C13'])) lines.push('栄養指導と体格管理を行います。');
    lines.push('3か月ごとに再評価を行います。');
    return lines.map((l,i) => `${i+1}. ${l}`).join('\n');
  });
  const [notes, setNotes] = useState(assessment.notes || '');
  const [saveMsg, setSaveMsg] = useState(false);

  const updatePlan = (code, field, value) => {
    setPlans(prev => ({...prev, [code]: {...prev[code], [field]: value}}));
  };

  const handleSave = () => {
    onSave({ ...assessment, plans, overallPlan, notes });
    setSaveMsg(true);
    setTimeout(() => setSaveMsg(false), 2500);
  };

  const checkedCodes = Object.keys(plans).sort((a,b) => {
    if (mode === 'kaika') {
      const kaikaOrder = ['K1','K2','K3','K4','K5','K6','K7'];
      return kaikaOrder.indexOf(a) - kaikaOrder.indexOf(b);
    }
    const numA = parseInt(a.replace('C',''));
    const numB = parseInt(b.replace('C',''));
    return numA - numB;
  });

  return (
    <div className="min-h-screen bg-gray-50">
      <Header title={mode === 'kaika' ? "管理計画書（口腔機能低下症）" : "管理計画書"} onBack={onBack} rightAction={
        <div className="flex gap-2">
          <LongPressButton onAction={handleSave} className={mode === 'kaika' ? "bg-teal-600 text-white px-4 py-2 rounded-xl font-medium text-sm" : "bg-primary-600 text-white px-4 py-2 rounded-xl font-medium text-sm"} label="保存"/>
          {saveMsg && <span className="text-green-600 text-xs font-medium self-center">保存済み</span>}
          <LongPressButton onAction={()=>{handleSave();onPrint();}} className="bg-dental-600 text-white px-4 py-2 rounded-xl font-medium text-sm" label="PDF出力"/>
          <button onClick={()=>{handleSave();onReferral();}} className="toggle-btn bg-amber-500 text-white px-3 py-2 rounded-xl font-medium text-xs">紹介状</button>
        </div>
      }/>
      {saveMsg && (
        <div className="fixed top-16 left-1/2 transform -translate-x-1/2 bg-green-600 text-white px-6 py-3 rounded-2xl shadow-lg z-50 text-sm font-medium animate-pulse">
          クラウドにデータが保存されました
        </div>
      )}
      <div className="p-4 max-w-2xl mx-auto">
        <div className={mode === 'kaika' ? "bg-teal-50 rounded-xl p-3 mb-4 text-sm text-teal-700 border border-teal-200" : "bg-red-50 rounded-xl p-3 mb-4 text-sm text-red-700"}>
          該当項目: <span className="font-bold">{checkedCodes.length}項目</span>（{checkedCodes.join(', ')}）
        </div>

        {checkedCodes.length === 0 ? (
          <div className="bg-white rounded-2xl card-shadow p-8 text-center text-gray-400">
            <p>該当する評価項目がありません</p>
          </div>
        ) : checkedCodes.map(code => {
          const item = mode === 'kaika' ? KAIKA_ITEMS.find(i=>i.code===code) : CHECK_ITEMS.find(i=>i.code===code);
          const plan = plans[code];
          return (
            <div key={code} className="bg-white rounded-2xl card-shadow mb-4 overflow-hidden">
              <div className={mode === 'kaika' ? "bg-teal-600 text-white px-4 py-2 text-sm font-bold" : "bg-primary-600 text-white px-4 py-2 text-sm font-bold"}>
                {code} {item?.label}
              </div>
              <div className="p-4 space-y-3">
                <div>
                  <label className="text-xs font-medium text-gray-500 block mb-1">問題点</label>
                  <textarea value={plan.problem} onChange={e=>updatePlan(code,'problem',e.target.value)}
                    className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm resize-none" rows={2}/>
                </div>
                {mode === 'kaika' ? (
                  <div>
                    <label className="text-xs font-medium text-gray-500 block mb-1">管理計画</label>
                    <textarea value={plan.plan} onChange={e=>updatePlan(code,'plan',e.target.value)}
                      className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm resize-none" rows={3}/>
                  </div>
                ) : plan.shortTerm !== undefined ? (
                  <>
                    <div>
                      <label className="text-xs font-medium text-gray-500 block mb-1">短期計画</label>
                      <textarea value={plan.shortTerm} onChange={e=>updatePlan(code,'shortTerm',e.target.value)}
                        className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm resize-none" rows={2}/>
                    </div>
                    <div>
                      <label className="text-xs font-medium text-gray-500 block mb-1">中長期計画</label>
                      <textarea value={plan.longTerm} onChange={e=>updatePlan(code,'longTerm',e.target.value)}
                        className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm resize-none" rows={2}/>
                    </div>
                  </>
                ) : (
                  <div>
                    <label className="text-xs font-medium text-gray-500 block mb-1">管理計画</label>
                    <textarea value={plan.plan} onChange={e=>updatePlan(code,'plan',e.target.value)}
                      className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm resize-none" rows={3}/>
                  </div>
                )}
              </div>
            </div>
          );
        })}

        <div className="bg-white rounded-2xl card-shadow mb-4 overflow-hidden">
          <div className="bg-gray-700 text-white px-4 py-2 text-sm font-bold">総合管理計画</div>
          <div className="p-4">
            <textarea value={overallPlan} onChange={e=>setOverallPlan(e.target.value)}
              className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm resize-none" rows={6}/>
          </div>
        </div>

        <div className="bg-white rounded-2xl card-shadow mb-4 p-4">
          <label className="text-xs font-medium text-gray-500 block mb-1">追加所見・メモ</label>
          <textarea value={notes} onChange={e=>setNotes(e.target.value)}
            className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm resize-none" rows={3} placeholder="自由記載..."/>
        </div>
      </div>
    </div>
  );
}

// --- Print View ---
function PrintView({ patient, assessment, onClose, mode }) {
  const age = calcAge(patient.birthDate);
  const isKaup = age !== null && age < 6;
  const isAdult = mode === 'kaika';
  const idx = isAdult ? calcBMI(parseFloat(patient.weight), parseFloat(patient.height)) : isKaup ? calcKaup(parseFloat(patient.weight), parseFloat(patient.height)) : calcRohrer(parseFloat(patient.weight), parseFloat(patient.height));
  const idxLabel = isAdult ? 'BMI' : isKaup ? 'カウプ指数' : 'ローレル指数';
  const plans = assessment.plans || {};
  const checkedCodes = Object.keys(plans).sort((a,b) => {
    if (mode === 'kaika') {
      const kaikaOrder = ['K1','K2','K3','K4','K5','K6','K7'];
      return kaikaOrder.indexOf(a) - kaikaOrder.indexOf(b);
    }
    const numA = parseInt(a.replace('C',''));
    const numB = parseInt(b.replace('C',''));
    return numA - numB;
  });

  const ki = assessment.kaikaItems || {};
  const kaikaPositiveCount = mode === 'kaika' ? Object.values(ki).filter(v => v.positive).length : 0;
  const getKaikaValue = (code) => {
    const d = ki[code];
    if (!d) return '-';
    if (code === 'K1') return d.value ? d.value + '%' : '-';
    if (code === 'K3') return d.value ? d.value + (d.subtype === 'teeth' ? '本' : 'N') : '-';
    if (code === 'K4') return `pa:${d.pa||'-'} ta:${d.ta||'-'} ka:${d.ka||'-'} 回/秒`;
    if (code === 'K7') return d.value ? d.value + '点' + (d.subtype === 'eat10' ? '(EAT-10)' : '(RSST)') : '-';
    return d.value || '-';
  };
  const getKaikaUnit = (code) => {
    if (code === 'K1') return '%';
    if (code === 'K2') return '';
    if (code === 'K3') return ki.K3?.subtype === 'teeth' ? '本' : 'N';
    if (code === 'K4') return '回/秒';
    if (code === 'K5') return 'kPa';
    if (code === 'K6') return 'mg/dL';
    if (code === 'K7') return '点';
    return '';
  };

  const pStyle = {padding:'4px 8px',border:'1px solid #ddd'};
  const phStyle = {...pStyle, background:'#f5f5f5',width:'80px'};

  return (
    <div>
      <div className="no-print bg-white border-b px-4 py-3 flex items-center justify-between sticky top-0 z-50">
        <button onClick={onClose} className="text-primary-600 font-medium">← 戻る</button>
        <LongPressButton onAction={()=>window.print()} className="bg-dental-600 text-white px-6 py-2 rounded-xl font-medium text-sm" label="PDF保存 / 印刷"/>
      </div>

      {mode === 'kaika' ? (
        <>
        {/* Kaika Page 1: 検査結果 */}
        <div className="print-page max-w-3xl mx-auto p-6 bg-white" style={{minHeight:'auto'}}>
          <h1 style={{fontSize:'18px',fontWeight:'bold',textAlign:'center',marginBottom:'4px',color:'#0f766e'}}>口腔機能低下症 検査結果</h1>
          <div style={{textAlign:'center',fontSize:'12px',color:'#666',marginBottom:'16px'}}>評価日: {formatDate(assessment.date)}</div>

          <table style={{width:'100%',borderCollapse:'collapse',fontSize:'13px',marginBottom:'12px'}}>
            <tbody>
              <tr><td style={phStyle}>患者名</td><td style={pStyle}>{patient.name}</td>
                  <td style={phStyle}>年齢</td><td style={pStyle}>{age}歳</td></tr>
              <tr><td style={phStyle}>性別</td><td style={pStyle}>{patient.sex==='M'?'男性':patient.sex==='F'?'女性':'-'}</td>
                  <td style={phStyle}>担当医</td><td style={pStyle}>{patient.doctor || '-'}</td></tr>
            </tbody>
          </table>

          <div style={{textAlign:'center',fontSize:'14px',fontWeight:'bold',marginBottom:'12px',padding:'8px',borderRadius:'8px',
            background: kaikaPositiveCount >= 3 ? '#fef2f2' : '#f0fdf4',
            color: kaikaPositiveCount >= 3 ? '#dc2626' : '#16a34a',
            border: kaikaPositiveCount >= 3 ? '2px solid #fca5a5' : '2px solid #86efac'}}>
            判定結果: 該当 {kaikaPositiveCount}/7項目
            {kaikaPositiveCount >= 3 ? ' → 口腔機能低下症に該当' : ' → 口腔機能低下症に非該当'}
          </div>

          <table style={{width:'100%',borderCollapse:'collapse',fontSize:'12px'}}>
            <thead>
              <tr style={{background:'#0f766e',color:'white'}}>
                <th style={{padding:'6px',border:'1px solid #0f766e',width:'40px'}}>No.</th>
                <th style={{padding:'6px',border:'1px solid #0f766e',textAlign:'left'}}>検査項目</th>
                <th style={{padding:'6px',border:'1px solid #0f766e',textAlign:'left',width:'120px'}}>検査方法</th>
                <th style={{padding:'6px',border:'1px solid #0f766e',width:'100px'}}>基準値</th>
                <th style={{padding:'6px',border:'1px solid #0f766e',width:'120px'}}>測定値</th>
                <th style={{padding:'6px',border:'1px solid #0f766e',width:'60px'}}>判定</th>
              </tr>
            </thead>
            <tbody>
              {KAIKA_ITEMS.map((item,i) => {
                const d = ki[item.code] || {};
                const isPositive = d.positive;
                const thresholds = {K1:'50%以上',K2:'27.0未満',K3:d.subtype==='teeth'?'20本未満':'200N未満',K4:'6.0回/秒未満',K5:'20kPa未満',K6:'100mg/dL未満',K7:'3点以上(EAT-10)'};
                return (
                  <tr key={item.code} style={{background: isPositive ? '#fef2f2' : i%2===0 ? '#fff' : '#f9fafb'}}>
                    <td style={{padding:'5px 6px',border:'1px solid #ddd',textAlign:'center',fontWeight:'bold'}}>{item.code}</td>
                    <td style={{padding:'5px 6px',border:'1px solid #ddd'}}>{item.label}</td>
                    <td style={{padding:'5px 6px',border:'1px solid #ddd',fontSize:'10px',color:'#666'}}>{item.method}</td>
                    <td style={{padding:'5px 6px',border:'1px solid #ddd',textAlign:'center',fontSize:'11px'}}>{thresholds[item.code]}</td>
                    <td style={{padding:'5px 6px',border:'1px solid #ddd',textAlign:'center',fontWeight:'bold'}}>{getKaikaValue(item.code)}</td>
                    <td style={{padding:'5px 6px',border:'1px solid #ddd',textAlign:'center',color:isPositive?'#dc2626':'#16a34a',fontWeight:'bold'}}>{isPositive ? '該当' : '非該当'}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>

          {assessment.notes && (
            <div style={{marginTop:'12px',fontSize:'11px',color:'#666'}}>
              <span style={{fontWeight:'bold'}}>備考:</span> {assessment.notes}
            </div>
          )}
        </div>

        {/* Kaika Page 2: 管理計画書 */}
        <div className="print-page max-w-3xl mx-auto p-6 bg-white mt-4">
          <h1 style={{fontSize:'18px',fontWeight:'bold',textAlign:'center',marginBottom:'4px',color:'#0f766e'}}>口腔機能低下症 管理計画書</h1>
          <div style={{textAlign:'center',fontSize:'12px',color:'#666',marginBottom:'16px'}}>
            患者名: {patient.name}　　作成日: {formatDate(assessment.date)}　　担当医: {patient.doctor || ''}
          </div>

          {checkedCodes.length > 0 && (
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:'12px',marginBottom:'16px'}}>
              <thead>
                <tr style={{background:'#0f766e',color:'white'}}>
                  <th style={{padding:'6px',border:'1px solid #0f766e',width:'100px'}}>項目</th>
                  <th style={{padding:'6px',border:'1px solid #0f766e'}}>問題点</th>
                  <th style={{padding:'6px',border:'1px solid #0f766e'}}>管理計画</th>
                </tr>
              </thead>
              <tbody>
                {checkedCodes.map((code,i) => {
                  const item = KAIKA_ITEMS.find(it=>it.code===code);
                  const plan = plans[code];
                  return (
                    <tr key={code} style={{background:i%2===0?'#fff':'#f9fafb'}}>
                      <td style={{padding:'6px',border:'1px solid #ddd',fontWeight:'bold',verticalAlign:'top'}}>
                        <div>{code}</div><div style={{fontSize:'10px',fontWeight:'normal',color:'#666'}}>{item?.label}</div>
                      </td>
                      <td style={{padding:'6px',border:'1px solid #ddd',verticalAlign:'top'}}>{plan.problem}</td>
                      <td style={{padding:'6px',border:'1px solid #ddd',verticalAlign:'top'}}>{plan.plan}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}

          <div style={{border:'2px solid #374151',borderRadius:'8px',padding:'12px',marginBottom:'12px'}}>
            <h3 style={{fontSize:'13px',fontWeight:'bold',marginBottom:'8px',color:'#374151'}}>総合管理計画</h3>
            <div style={{fontSize:'12px',whiteSpace:'pre-line'}}>{assessment.overallPlan || ''}</div>
          </div>

          {assessment.notes && (
            <div style={{border:'1px solid #ddd',borderRadius:'8px',padding:'12px'}}>
              <h3 style={{fontSize:'13px',fontWeight:'bold',marginBottom:'4px',color:'#666'}}>追加所見</h3>
              <div style={{fontSize:'12px',whiteSpace:'pre-line'}}>{assessment.notes}</div>
            </div>
          )}

          <div style={{marginTop:'24px',fontSize:'11px',color:'#999',textAlign:'right'}}>
            次回評価予定: ＿＿＿＿年＿＿月＿＿日
          </div>
        </div>
        </>
      ) : (
        <>
        {/* Hattatsu Page 1: チェックシート */}
        <div className="print-page max-w-3xl mx-auto p-6 bg-white" style={{minHeight:'auto'}}>
          <h1 style={{fontSize:'18px',fontWeight:'bold',textAlign:'center',marginBottom:'4px'}}>口腔機能評価チェックシート</h1>
          <div style={{textAlign:'center',fontSize:'12px',color:'#666',marginBottom:'16px'}}>評価日: {formatDate(assessment.date)}</div>

          <table style={{width:'100%',borderCollapse:'collapse',fontSize:'13px',marginBottom:'12px'}}>
            <tbody>
              <tr><td style={phStyle}>患者名</td><td style={pStyle}>{patient.name}</td>
                  <td style={phStyle}>年齢</td><td style={pStyle}>{age}歳</td></tr>
              <tr><td style={phStyle}>体重</td><td style={pStyle}>{patient.weight} kg</td>
                  <td style={phStyle}>身長</td><td style={pStyle}>{patient.height} cm</td></tr>
              <tr><td style={phStyle}>{idxLabel}</td><td style={pStyle}>{idx || '-'}</td>
                  <td style={phStyle}>口唇閉鎖力</td><td style={pStyle}>{assessment.lipForce ? assessment.lipForce+' N' : '-'}</td></tr>
              <tr><td style={phStyle}>舌圧</td><td style={pStyle}>{assessment.tonguePressure ? assessment.tonguePressure+' kPa' : '-'}</td>
                  <td style={phStyle}>担当医</td><td style={pStyle}>{patient.doctor || '-'}</td></tr>
            </tbody>
          </table>

          <table style={{width:'100%',borderCollapse:'collapse',fontSize:'12px'}}>
            <thead>
              <tr style={{background:'#2563eb',color:'white'}}>
                <th style={{padding:'6px',border:'1px solid #2563eb',width:'50px'}}>コード</th>
                <th style={{padding:'6px',border:'1px solid #2563eb',textAlign:'left'}}>評価項目</th>
                <th style={{padding:'6px',border:'1px solid #2563eb',width:'60px'}}>結果</th>
              </tr>
            </thead>
            <tbody>
              {CHECK_ITEMS.map((item,i) => {
                const val = assessment.checks?.[item.code];
                let result = '-';
                let isPositive = false;
                if (item.code === 'C11') { isPositive = val && val.length > 0; result = isPositive ? val.join(', ') : '該当なし'; }
                else if (item.code === 'C13') { isPositive = val==='underweight'||val==='overweight'; result = val==='normal'?'正常':val==='underweight'?'やせ':'肥満'; }
                else if (item.code === 'C17') { isPositive = val && val.length > 0; result = isPositive ? '該当' : '-'; }
                else { isPositive = val === true; result = val === true ? '該当' : '非該当'; }
                return (
                  <tr key={item.code} style={{background: isPositive ? '#fef2f2' : i%2===0 ? '#fff' : '#f9fafb'}}>
                    <td style={{padding:'4px 6px',border:'1px solid #ddd',textAlign:'center',fontWeight:'bold'}}>{item.code}</td>
                    <td style={{padding:'4px 6px',border:'1px solid #ddd'}}>{item.label}</td>
                    <td style={{padding:'4px 6px',border:'1px solid #ddd',textAlign:'center',color:isPositive?'#dc2626':'#666',fontWeight:isPositive?'bold':'normal'}}>{item.code==='C11' && isPositive ? '該当' : result}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          {assessment.checks?.C11 && assessment.checks.C11.length > 0 && (
            <div style={{fontSize:'11px',marginTop:'4px',color:'#666'}}>C11 口腔習癖: {assessment.checks.C11.join('、')}</div>
          )}
          {assessment.checks?.C17 && (
            <div style={{fontSize:'11px',marginTop:'4px',color:'#666'}}>C17 上記以外の問題点: {assessment.checks.C17}</div>
          )}
        </div>

        {/* Hattatsu Page 2: 管理計画書 */}
        <div className="print-page max-w-3xl mx-auto p-6 bg-white mt-4">
          <h1 style={{fontSize:'18px',fontWeight:'bold',textAlign:'center',marginBottom:'4px',color:'#1d4ed8'}}>口腔機能発達不全症 管理計画書</h1>
          <div style={{textAlign:'center',fontSize:'12px',color:'#666',marginBottom:'16px'}}>
            患者名: {patient.name}　　作成日: {formatDate(assessment.date)}　　担当医: {patient.doctor || ''}
          </div>

          {checkedCodes.length > 0 && (
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:'12px',marginBottom:'16px'}}>
              <thead>
                <tr style={{background:'#1d4ed8',color:'white'}}>
                  <th style={{padding:'6px',border:'1px solid #1d4ed8',width:'100px'}}>項目</th>
                  <th style={{padding:'6px',border:'1px solid #1d4ed8'}}>問題点</th>
                  <th style={{padding:'6px',border:'1px solid #1d4ed8'}}>短期計画</th>
                  <th style={{padding:'6px',border:'1px solid #1d4ed8'}}>中長期計画</th>
                </tr>
              </thead>
              <tbody>
                {checkedCodes.map((code,i) => {
                  const item = CHECK_ITEMS.find(it=>it.code===code);
                  const plan = plans[code];
                  const is3stage = plan.shortTerm !== undefined;
                  return (
                    <tr key={code} style={{background:i%2===0?'#fff':'#f9fafb'}}>
                      <td style={{padding:'6px',border:'1px solid #ddd',fontWeight:'bold',verticalAlign:'top'}}>
                        <div>{code}</div><div style={{fontSize:'10px',fontWeight:'normal',color:'#666'}}>{item?.label}</div>
                      </td>
                      <td style={{padding:'6px',border:'1px solid #ddd',verticalAlign:'top'}}>{plan.problem}</td>
                      {is3stage ? (
                        <>
                          <td style={{padding:'6px',border:'1px solid #ddd',verticalAlign:'top'}}>{plan.shortTerm}</td>
                          <td style={{padding:'6px',border:'1px solid #ddd',verticalAlign:'top'}}>{plan.longTerm}</td>
                        </>
                      ) : (
                        <td colSpan={2} style={{padding:'6px',border:'1px solid #ddd',verticalAlign:'top'}}>{plan.plan}</td>
                      )}
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}

          <div style={{border:'2px solid #374151',borderRadius:'8px',padding:'12px',marginBottom:'12px'}}>
            <h3 style={{fontSize:'13px',fontWeight:'bold',marginBottom:'8px',color:'#374151'}}>総合管理計画</h3>
            <div style={{fontSize:'12px',whiteSpace:'pre-line'}}>{assessment.overallPlan || ''}</div>
          </div>

          {assessment.notes && (
            <div style={{border:'1px solid #ddd',borderRadius:'8px',padding:'12px'}}>
              <h3 style={{fontSize:'13px',fontWeight:'bold',marginBottom:'4px',color:'#666'}}>追加所見</h3>
              <div style={{fontSize:'12px',whiteSpace:'pre-line'}}>{assessment.notes}</div>
            </div>
          )}

          <div style={{marginTop:'24px',fontSize:'11px',color:'#999',textAlign:'right'}}>
            次回評価予定: ＿＿＿＿年＿＿月＿＿日
          </div>
        </div>
        </>
      )}
    </div>
  );
}

// --- Referral Letter (診療情報提供書) ---
function ReferralLetter({ patient, assessment, onClose, mode }) {
  const STORAGE_KEY = 'oralcare_referral_clinic';
  const saved = useMemo(() => {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
  }, []);

  const [destClinic, setDestClinic] = useState('');
  const [destDoctor, setDestDoctor] = useState('');
  const [srcClinic, setSrcClinic] = useState(saved.clinicName || '');
  const [srcAddress, setSrcAddress] = useState(saved.clinicAddress || '');
  const [srcPhone, setSrcPhone] = useState(saved.clinicPhone || '');
  const [srcDoctor, setSrcDoctor] = useState(patient.doctor || '');
  const [purpose, setPurpose] = useState('');
  const [remarks, setRemarks] = useState('');

  const saveSrcInfo = () => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ clinicName: srcClinic, clinicAddress: srcAddress, clinicPhone: srcPhone }));
  };

  const age = calcAge(patient.birthDate);
  const today = formatDate(new Date().toISOString().split('T')[0]);

  const presets = mode === 'kaika' ? [
    '栄養状態の評価・管理をお願いいたします。',
    '全身状態の管理についてご相談させていただきたく、ご紹介いたします。',
    '服薬調整についてご相談させていただきたく、ご紹介いたします。',
  ] : [
    '口呼吸・鼻閉についての精査をお願いいたします。',
    '扁桃肥大・いびきについての精査をお願いいたします。',
    '栄養状態の評価・食事指導をお願いいたします。',
    '耳鼻咽喉科的精査をお願いいたします。',
  ];

  // Kaika: build results summary
  const getKaikaValue = (code) => {
    const d = assessment.kaikaItems?.[code];
    if (!d) return '-';
    if (code === 'K4') {
      const pa = d.pa ? (d.pa / 10).toFixed(1) : '-';
      const ta = d.ta ? (d.ta / 10).toFixed(1) : '-';
      const ka = d.ka ? (d.ka / 10).toFixed(1) : '-';
      return `pa${pa} ta${ta} ka${ka}`;
    }
    if (code === 'K7' && d.subtype === 'rsst') return `RSST ${d.value || '-'}回/30秒`;
    if (code === 'K7') return `EAT-10 ${d.value || '-'}点`;
    if (code === 'K3' && d.subtype === 'teeth') return `残存歯 ${d.value || '-'}本`;
    if (code === 'K3') return `${d.value || '-'}N`;
    return d.value || '-';
  };

  const kaikaPositiveCount = assessment.kaikaItems ? Object.values(assessment.kaikaItems).filter(i => i.positive).length : 0;

  const handlePrint = () => {
    saveSrcInfo();
    window.print();
  };

  const pStyle = {padding:'4px 8px',border:'1px solid #ccc',fontSize:'12px'};
  const phStyle = {...pStyle, background:'#f0f0f0',fontWeight:'bold'};

  return (
    <div className="min-h-screen bg-gray-50">
      {/* Input Form - no-print */}
      <div className="no-print">
        <Header title="紹介状作成" onBack={onClose} rightAction={
          <LongPressButton onAction={handlePrint} className="bg-dental-600 text-white px-4 py-2 rounded-xl font-medium text-sm" label="印刷 / PDF"/>
        }/>
        <div className="p-4 max-w-2xl mx-auto">
          <div className="bg-white rounded-2xl card-shadow p-4 mb-4">
            <h3 className="text-sm font-bold text-gray-700 mb-3">紹介先</h3>
            <input value={destClinic} onChange={e=>setDestClinic(e.target.value)}
              className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm mb-2" placeholder="医療機関名（例：○○病院）"/>
            <input value={destDoctor} onChange={e=>setDestDoctor(e.target.value)}
              className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm" placeholder="医師名（例：山田太郎）"/>
          </div>

          <div className="bg-white rounded-2xl card-shadow p-4 mb-4">
            <h3 className="text-sm font-bold text-gray-700 mb-3">紹介元（自院情報）<span className="text-xs text-gray-400 font-normal ml-2">※次回から自動入力されます</span></h3>
            <input value={srcClinic} onChange={e=>setSrcClinic(e.target.value)}
              className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm mb-2" placeholder="医院名（例：□□歯科医院）"/>
            <input value={srcAddress} onChange={e=>setSrcAddress(e.target.value)}
              className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm mb-2" placeholder="住所"/>
            <input value={srcPhone} onChange={e=>setSrcPhone(e.target.value)}
              className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm mb-2" placeholder="電話番号"/>
            <input value={srcDoctor} onChange={e=>setSrcDoctor(e.target.value)}
              className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm" placeholder="医師名"/>
          </div>

          <div className="bg-white rounded-2xl card-shadow p-4 mb-4">
            <h3 className="text-sm font-bold text-gray-700 mb-3">紹介目的</h3>
            <div className="flex flex-wrap gap-2 mb-2">
              {presets.map((p,i) => (
                <button key={i} onClick={() => setPurpose(p)}
                  className="toggle-btn text-xs bg-blue-50 text-blue-700 px-3 py-1.5 rounded-lg border border-blue-200">{p.substring(0, 15)}...</button>
              ))}
            </div>
            <textarea value={purpose} onChange={e=>setPurpose(e.target.value)}
              className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm resize-none" rows={3} placeholder="紹介目的を入力..."/>
          </div>

          <div className="bg-white rounded-2xl card-shadow p-4 mb-4">
            <h3 className="text-sm font-bold text-gray-700 mb-3">備考</h3>
            <textarea value={remarks} onChange={e=>setRemarks(e.target.value)}
              className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm resize-none" rows={3} placeholder="その他伝達事項..."/>
          </div>
        </div>
      </div>

      {/* Print Layout */}
      <div className="print-page" style={{fontFamily:'serif',color:'#333',lineHeight:'1.6',maxWidth:'700px',margin:'0 auto'}}>
        <h1 style={{fontSize:'20px',fontWeight:'bold',textAlign:'center',marginBottom:'16px',letterSpacing:'4px'}}>診療情報提供書</h1>

        <div style={{display:'flex',justifyContent:'space-between',marginBottom:'16px'}}>
          <div style={{fontSize:'13px'}}>
            <div style={{marginBottom:'4px'}}><strong>{destClinic || '＿＿＿＿＿＿＿＿'}</strong> 御中</div>
            {destDoctor && <div>{destDoctor} 先生 御侍史</div>}
          </div>
          <div style={{fontSize:'12px',textAlign:'right'}}>
            <div>作成日: {today}</div>
          </div>
        </div>

        <div style={{border:'1px solid #999',borderRadius:'4px',padding:'12px',marginBottom:'16px',fontSize:'12px'}}>
          <div style={{fontWeight:'bold',marginBottom:'4px',fontSize:'13px'}}>{srcClinic || '＿＿＿＿歯科医院'}</div>
          {srcAddress && <div>{srcAddress}</div>}
          {srcPhone && <div>TEL: {srcPhone}</div>}
          <div style={{marginTop:'4px'}}>医師名: {srcDoctor || '＿＿＿＿＿＿'}</div>
        </div>

        {/* 患者情報 */}
        <table style={{width:'100%',borderCollapse:'collapse',marginBottom:'12px'}}>
          <tbody>
            <tr>
              <td style={phStyle}>患者氏名</td>
              <td style={pStyle}>{patient.name}</td>
              <td style={phStyle}>年齢</td>
              <td style={pStyle}>{age !== null ? `${age}歳` : '-'}</td>
              <td style={phStyle}>性別</td>
              <td style={pStyle}>{patient.sex==='M'?(mode==='kaika'?'男性':'男児'):patient.sex==='F'?(mode==='kaika'?'女性':'女児'):'-'}</td>
            </tr>
            <tr>
              <td style={phStyle}>生年月日</td>
              <td style={pStyle} colSpan={3}>{formatDate(patient.birthDate)}</td>
              <td style={phStyle}>患者ID</td>
              <td style={pStyle}>{patient.patientId || '-'}</td>
            </tr>
          </tbody>
        </table>

        {/* 傷病名 */}
        <table style={{width:'100%',borderCollapse:'collapse',marginBottom:'12px'}}>
          <tbody>
            <tr>
              <td style={{...phStyle,width:'80px'}}>傷病名</td>
              <td style={pStyle}>
                {mode === 'kaika' ? '口腔機能低下症' : '口腔機能発達不全症'}
                {mode === 'kaika' && <span style={{marginLeft:'8px',fontSize:'11px',color:'#666'}}>（7項目中{kaikaPositiveCount}項目該当）</span>}
              </td>
            </tr>
          </tbody>
        </table>

        {/* 検査結果 */}
        <div style={{marginBottom:'12px'}}>
          <div style={{fontSize:'13px',fontWeight:'bold',marginBottom:'4px',borderBottom:'1px solid #333',paddingBottom:'2px'}}>検査結果（{formatDate(assessment.date)}実施）</div>
          {mode === 'kaika' ? (
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:'11px'}}>
              <thead>
                <tr style={{background:'#f0f0f0'}}>
                  <th style={pStyle}>項目</th>
                  <th style={pStyle}>検査法</th>
                  <th style={pStyle}>測定値</th>
                  <th style={{...pStyle,width:'50px'}}>判定</th>
                </tr>
              </thead>
              <tbody>
                {KAIKA_ITEMS.map(item => {
                  const d = assessment.kaikaItems?.[item.code];
                  return (
                    <tr key={item.code} style={{background: d?.positive ? '#fef2f2' : '#fff'}}>
                      <td style={pStyle}>{item.code} {item.label}</td>
                      <td style={pStyle}>{item.method}</td>
                      <td style={pStyle}>{getKaikaValue(item.code)}</td>
                      <td style={{...pStyle,textAlign:'center',fontWeight:'bold',color: d?.positive ? '#dc2626' : '#16a34a'}}>{d?.positive ? '該当' : '非該当'}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          ) : (
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:'11px'}}>
              <tbody>
                {assessment.lipForce && (
                  <tr><td style={phStyle}>口唇閉鎖力</td><td style={pStyle}>{assessment.lipForce} N</td></tr>
                )}
                {assessment.tonguePressure && (
                  <tr><td style={phStyle}>舌圧</td><td style={pStyle}>{assessment.tonguePressure} kPa</td></tr>
                )}
                {CHECK_ITEMS.filter(item => {
                  const v = assessment.checks?.[item.code];
                  if (item.code==='C11') return v && v.length > 0;
                  if (item.code==='C13') return v==='underweight'||v==='overweight';
                  if (item.code==='C17') return v && v.length > 0;
                  return v === true;
                }).map(item => (
                  <tr key={item.code} style={{background:'#fef2f2'}}>
                    <td style={phStyle}>{item.code}</td>
                    <td style={pStyle}>{item.label}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>

        {/* 現在の管理内容 */}
        {assessment.overallPlan && (
          <div style={{marginBottom:'12px'}}>
            <div style={{fontSize:'13px',fontWeight:'bold',marginBottom:'4px',borderBottom:'1px solid #333',paddingBottom:'2px'}}>現在の管理内容</div>
            <div style={{fontSize:'12px',whiteSpace:'pre-line',padding:'4px'}}>{assessment.overallPlan}</div>
          </div>
        )}

        {/* 紹介目的 */}
        <div style={{marginBottom:'12px'}}>
          <div style={{fontSize:'13px',fontWeight:'bold',marginBottom:'4px',borderBottom:'1px solid #333',paddingBottom:'2px'}}>紹介目的</div>
          <div style={{fontSize:'12px',whiteSpace:'pre-line',padding:'4px',minHeight:'40px'}}>{purpose || '＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿'}</div>
        </div>

        {/* 備考 */}
        {remarks && (
          <div style={{marginBottom:'12px'}}>
            <div style={{fontSize:'13px',fontWeight:'bold',marginBottom:'4px',borderBottom:'1px solid #333',paddingBottom:'2px'}}>備考</div>
            <div style={{fontSize:'12px',whiteSpace:'pre-line',padding:'4px'}}>{remarks}</div>
          </div>
        )}

        <div style={{marginTop:'20px',fontSize:'12px',textAlign:'center',color:'#666'}}>
          以上、ご高診のほどよろしくお願いいたします。
        </div>
      </div>
    </div>
  );
}

// --- Screening Test (発達不全症スクリーニング) ---
function ScreeningTest({ patient, onBack, onSave, onGoAssessment }) {
  const age = calcAge(patient.birthDate);
  const sex = patient.sex || 'M';
  const existing = patient.screening || {};

  const [lipForce, setLipForce] = useState(existing.lipForce || '');
  const [tonguePressure, setTonguePressure] = useState(existing.tonguePressure || '');
  const [saveMsg, setSaveMsg] = useState(false);

  const lipThreshold = getLipThreshold(age, sex);
  const tongueThreshold = getTongueThreshold(age);

  const lipVal = lipForce !== '' ? parseFloat(lipForce) : null;
  const tongueVal = tonguePressure !== '' ? parseFloat(tonguePressure) : null;
  const lipPositive = lipVal !== null && !isNaN(lipVal) && lipVal < lipThreshold;
  const tonguePositive = tongueVal !== null && !isNaN(tongueVal) && tongueVal < tongueThreshold;
  const anyPositive = lipPositive || tonguePositive;
  const hasInput = lipVal !== null || tongueVal !== null;

  const handleSave = () => {
    const screening = {
      date: new Date().toISOString().split('T')[0],
      lipForce, tonguePressure,
      lipPositive, tonguePositive
    };
    onSave(screening);
    setSaveMsg(true);
    setTimeout(() => setSaveMsg(false), 2000);
  };

  const handleGoAssessment = () => {
    handleSave();
    onGoAssessment(lipForce, tonguePressure);
  };

  const sexLabel = sex === 'M' ? '男児' : '女児';

  return (
    <div className="min-h-screen bg-gray-50">
      <Header title="スクリーニング検査" onBack={onBack} rightAction={
        <LongPressButton onAction={handleSave} className="bg-primary-600 text-white px-4 py-2 rounded-xl font-medium text-sm" label="保存"/>
      }/>
      {saveMsg && (
        <div className="fixed top-16 left-1/2 transform -translate-x-1/2 bg-green-600 text-white px-6 py-3 rounded-2xl shadow-lg z-50 text-sm font-medium animate-pulse">保存しました</div>
      )}
      <div className="p-4 max-w-2xl mx-auto">
        {/* Patient Info */}
        <div className="bg-white rounded-2xl card-shadow p-3 mb-4 flex items-center gap-3">
          <div className="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 font-bold text-lg">{patient.name?.charAt(0)}</div>
          <div>
            <div className="font-bold text-gray-800">{patient.name}</div>
            <div className="text-xs text-gray-500">{age !== null ? `${age}歳` : ''} {sexLabel}</div>
          </div>
        </div>

        {/* 口唇閉鎖力 */}
        <div className="bg-white rounded-2xl card-shadow mb-4 overflow-hidden">
          <div className="bg-blue-600 text-white px-4 py-2 text-sm font-bold flex justify-between items-center">
            <span>口唇閉鎖力検査</span>
            <span className="text-xs font-normal opacity-80">りっぷるくん等</span>
          </div>
          <div className="p-4">
            <div className="flex items-center gap-3 mb-3">
              <input type="number" step="0.1" value={lipForce} onChange={e=>setLipForce(e.target.value)}
                className="flex-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-lg text-center font-bold" placeholder="測定値"/>
              <span className="text-gray-500 font-medium text-lg">N</span>
            </div>
            <div className="text-xs text-gray-400 mb-2">
              基準値（-1SD）: <span className="font-bold text-gray-600">{lipThreshold} N</span>
              <span className="text-gray-400 ml-1">（{age}歳{sexLabel}）</span>
            </div>
            {lipVal !== null && !isNaN(lipVal) && (
              <div className={`flex items-center justify-between px-3 py-2 rounded-lg text-sm font-medium ${
                lipPositive ? 'bg-red-50 text-red-600 border border-red-200' : 'bg-green-50 text-green-600 border border-green-200'
              }`}>
                <span>測定値: {lipForce} N（基準: {lipThreshold} N）</span>
                <span className="font-bold">{lipPositive ? '基準値未満' : '基準値以上'}</span>
              </div>
            )}
          </div>
        </div>

        {/* 舌圧 */}
        <div className="bg-white rounded-2xl card-shadow mb-4 overflow-hidden">
          <div className="bg-purple-600 text-white px-4 py-2 text-sm font-bold flex justify-between items-center">
            <span>舌圧検査</span>
            <span className="text-xs font-normal opacity-80">JMS舌圧測定器</span>
          </div>
          <div className="p-4">
            <div className="flex items-center gap-3 mb-3">
              <input type="number" step="0.1" value={tonguePressure} onChange={e=>setTonguePressure(e.target.value)}
                className="flex-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-lg text-center font-bold" placeholder="測定値"/>
              <span className="text-gray-500 font-medium text-lg">kPa</span>
            </div>
            <div className="text-xs text-gray-400 mb-2">
              基準値（cut-off）: <span className="font-bold text-gray-600">{tongueThreshold} kPa</span>
              <span className="text-gray-400 ml-1">（{age}歳）</span>
            </div>
            {tongueVal !== null && !isNaN(tongueVal) && (
              <div className={`flex items-center justify-between px-3 py-2 rounded-lg text-sm font-medium ${
                tonguePositive ? 'bg-red-50 text-red-600 border border-red-200' : 'bg-green-50 text-green-600 border border-green-200'
              }`}>
                <span>測定値: {tonguePressure} kPa（基準: {tongueThreshold} kPa）</span>
                <span className="font-bold">{tonguePositive ? '基準値未満' : '基準値以上'}</span>
              </div>
            )}
          </div>
        </div>

        {/* 総合判定 */}
        {hasInput && (
          <div className={`rounded-2xl card-shadow p-5 mb-4 ${
            anyPositive ? 'bg-red-50 border-2 border-red-300' : 'bg-green-50 border-2 border-green-300'
          }`}>
            <div className="text-center">
              <div className={`text-lg font-black mb-1 ${anyPositive ? 'text-red-700' : 'text-green-700'}`}>
                {anyPositive ? '口腔機能発達不全症の疑いあり' : '基準値以上（現時点で異常なし）'}
              </div>
              {anyPositive && (
                <div className="text-sm text-red-600">
                  {lipPositive && tonguePositive ? '口唇閉鎖力・舌圧ともに基準値未満' :
                   lipPositive ? '口唇閉鎖力が基準値未満' : '舌圧が基準値未満'}
                  → 口腔機能評価を実施してください
                </div>
              )}
            </div>
          </div>
        )}

        {/* Action Buttons */}
        {anyPositive && (
          <button onClick={handleGoAssessment}
            className="w-full bg-red-600 text-white py-4 rounded-2xl font-bold text-base mb-3 active:bg-red-700 transition card-shadow">
            → 口腔機能評価（C1-C17）へ進む
          </button>
        )}
      </div>
    </div>
  );
}

// --- Billing Flow Chart ---
function BillingFlowChart({ patient, assessments, mode, onBack }) {
  const [step, setStep] = useState(0);
  const [visitType, setVisitType] = useState(null);
  const [hasKoukankyou, setHasKoukankyou] = useState(null);
  const [showResult, setShowResult] = useState(false);

  const age = calcAge(patient.birthDate);
  const patientAssessments = assessments.filter(a => a.patientId === patient.id).sort((a,b) => new Date(b.date) - new Date(a.date));
  const latest = patientAssessments[0];
  // 低下症: kaikaItemsから陽性数
  const kaikaPositiveCount = latest?.kaikaItems ? Object.values(latest.kaikaItems).filter(i => i.positive).length : 0;
  const k3Subtype = latest?.kaikaItems?.K3?.subtype;
  // 発達不全症: checksから陽性数
  const hattatsuPositiveCount = latest?.checks ? Object.entries(latest.checks).filter(([k,v]) => {
    if(k==='C11') return v && v.length > 0;
    if(k==='C13') return v==='underweight' || v==='overweight';
    if(k==='C17') return v && v.length > 0;
    if(k==='C11_has' || k==='C13_patient') return false;
    return v === true;
  }).length : 0;
  const positiveCount = mode === 'kaika' ? kaikaPositiveCount : hattatsuPositiveCount;

  // 段階判定
  const getDiagnosisLevel = () => {
    if (mode === 'kaika') {
      if (positiveCount >= 3) return 'confirmed'; // 口腔機能低下症
      if (positiveCount >= 1) return 'managing';  // 管理中
      return 'suspected';                          // 疑い
    } else {
      // 発達不全症: 簡易判定（詳細は授乳/卒乳で異なるが、ここでは項目数で判定）
      if (positiveCount >= 3) return 'confirmed';  // 口腔機能発達不全症
      if (positiveCount >= 1) return 'managing';   // 管理中
      return 'suspected';                           // 疑い
    }
  };
  const diagLevel = latest ? getDiagnosisLevel() : 'suspected';
  const diagLabel = mode === 'kaika'
    ? { suspected: '口腔機能低下症の疑い', managing: '口腔機能 管理中', confirmed: '口腔機能低下症' }
    : { suspected: '口腔機能発達不全症の疑い', managing: '口腔機能 管理中', confirmed: '口腔機能発達不全症' };

  // === 低下症の算定データ（3段階） ===
  const KAIKA_EXAM = [
    { code: '舌圧検査', points: 140, freq: '3月に1回', note: '舌圧測定器' },
    { code: '咀嚼能力検査1', points: 140, freq: '3月に1回', note: 'グルコセンサー等', group: 'exam3m' },
    { code: '咬合圧検査1', points: 130, freq: '3月に1回', note: 'デンタルプレスケールII', group: 'exam3m' },
    { code: '口腔細菌定量検査2', points: 65, freq: '3月に1回', note: '細菌カウンタ' },
  ];
  const KAIKA_MGMT_BASIC = [
    { code: '歯科疾患管理料', points: 100, freq: '月1回', note: '歯管' },
    { code: '実地指導料1', points: 80, freq: '月1回', note: 'DH実施' },
    { code: '口腔機能指導加算', points: 10, freq: '月1回', note: '実地指導に併算定' },
  ];
  const KAIKA_MGMT_FULL = [
    { code: '口腔機能管理料', points: 60, freq: '月1回', note: '口機能' },
    { code: '口管強加算', points: 50, freq: '月1回', condition: 'koukankyou' },
    { code: '歯リハ3の2', points: 50, freq: '月2回', note: '口腔機能訓練' },
  ];

  // === 発達不全症の算定データ（3段階） ===
  const HATTATSU_EXAM = [
    { code: '小児口唇閉鎖力検査', points: 100, freq: '3月に1回' },
    { code: '舌圧検査', points: 140, freq: '3月に1回' },
  ];
  const HATTATSU_MGMT_BASIC = [
    { code: '歯科疾患管理料', points: 100, freq: '月1回', note: '歯管' },
    { code: '実地指導料1', points: 80, freq: '月1回', note: 'DH実施' },
    { code: '口腔機能指導加算', points: 10, freq: '月1回', note: '実地指導に併算定' },
  ];
  const HATTATSU_MGMT_FULL = [
    { code: '小児口腔機能管理料', points: 60, freq: '月1回', note: '小機能' },
    { code: '口管強加算', points: 50, freq: '月1回', condition: 'koukankyou' },
    { code: '歯リハ3の1', points: 50, freq: '月2回', note: '口腔機能訓練' },
  ];

  const getApplicableItems = () => {
    if (visitType === 'screening') {
      return mode === 'hattatsu' ? HATTATSU_EXAM : [];
    }
    const examItems = mode === 'kaika' ? KAIKA_EXAM : HATTATSU_EXAM;
    let items = [];
    // 検査料（初回・再評価時）
    if (visitType === 'first' || visitType === 'reeval') {
      const ungrouped = examItems.filter(i => !i.group);
      const exam3m = examItems.filter(i => i.group === 'exam3m');
      if (exam3m.length > 0) {
        if (k3Subtype === 'force') {
          ungrouped.push(exam3m.find(i => i.code.includes('咬合圧')) || exam3m[0]);
        } else {
          ungrouped.push({...exam3m.find(i => i.code.includes('咀嚼')) || exam3m[0], note: (exam3m[0].note||'') + ' ※咬合圧検査と択一'});
        }
      }
      items = [...ungrouped];
    }
    // 管理料（段階に応じて）
    if (diagLevel === 'suspected') {
      // 疑い → 検査のみ
      return items;
    }
    const basicMgmt = mode === 'kaika' ? KAIKA_MGMT_BASIC : HATTATSU_MGMT_BASIC;
    items = [...items, ...basicMgmt];
    if (diagLevel === 'confirmed') {
      const fullMgmt = (mode === 'kaika' ? KAIKA_MGMT_FULL : HATTATSU_MGMT_FULL).filter(item => {
        if (item.condition === 'koukankyou' && !hasKoukankyou) return false;
        return true;
      });
      items = [...items, ...fullMgmt];
    }
    return items;
  };

  const WARNINGS = {
    kaika: {
      suspected: ['検査のみ算定可能です', '3項目以上陽性で口腔機能低下症の診断となります', '咬合圧検査と咀嚼能力検査は3月以内にいずれか1回のみ'],
      managing: ['口機能・口管強・歯リハ3は確定診断（3項目以上陽性）後に算定可能', '咬合圧検査と咀嚼能力検査は3月以内にいずれか1回のみ'],
      confirmed: ['咬合圧検査と咀嚼能力検査は3月以内にいずれか1回のみ', '口機能は歯管または特疾管の算定患者に限る', '歯リハ3は月2回まで算定可'],
    },
    hattatsu: {
      suspected: ['スクリーニングのみの場合、管理料は算定できません', '基準値未満の場合 → 口腔機能評価（C1-C17）へ'],
      managing: ['小機能・口管強・歯リハ3は確定診断後に算定可能', '対象: 18歳未満'],
      confirmed: ['小機能は歯管または特疾管の算定患者に限る', '歯リハ3は月2回まで算定可', '対象: 18歳未満'],
    }
  };

  const handleNext = () => {
    if (step === 0 && visitType) {
      if (visitType === 'screening') { setShowResult(true); return; }
      setStep(1);
    }
    else if (step === 1 && hasKoukankyou !== null) setShowResult(true);
  };
  const handleStepBack = () => {
    if (showResult) setShowResult(false);
    else if (step > 0) setStep(step - 1);
    else onBack();
  };

  const items = showResult ? getApplicableItems() : [];
  const totalPoints = items.reduce((sum, i) => sum + i.points, 0);
  const allExamCodes = [...(mode === 'kaika' ? KAIKA_EXAM : HATTATSU_EXAM)].map(e => e.code);
  const examItems = items.filter(i => allExamCodes.includes(i.code));
  const mgmtItems = items.filter(i => !allExamCodes.includes(i.code));
  const activeWarnings = visitType === 'screening'
    ? (WARNINGS[mode]?.suspected || [])
    : (WARNINGS[mode]?.[diagLevel] || []);

  return (
    <div className="min-h-screen bg-gray-50">
      <Header title="算定ガイド" onBack={handleStepBack} />
      <div className="p-4 max-w-2xl mx-auto">
        <div className="bg-white rounded-2xl card-shadow p-3 mb-4 flex items-center gap-3">
          <div className="w-10 h-10 rounded-full bg-primary-100 flex items-center justify-center text-primary-700 font-bold text-lg">{patient.name?.charAt(0)}</div>
          <div>
            <div className="font-bold text-gray-800">{patient.name}</div>
            <div className="text-xs text-gray-500">{age !== null ? `${age}歳` : ''} ・ {diagLabel[diagLevel]}</div>
          </div>
          {latest && (
            <div className="ml-auto text-right">
              <div className="text-xs text-gray-400">最新評価</div>
              <div className={`text-sm font-bold ${diagLevel === 'confirmed' ? 'text-red-600' : diagLevel === 'managing' ? 'text-orange-600' : 'text-green-600'}`}>{positiveCount}項目陽性</div>
            </div>
          )}
        </div>

        {!showResult ? (
          <>
            <div className="flex items-center justify-center gap-2 mb-6">
              {[0,1].map(i => (
                <div key={i} className="flex items-center">
                  <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold ${
                    i < step ? 'bg-green-500 text-white' : i === step ? 'bg-primary-600 text-white' : 'bg-gray-200 text-gray-400'
                  }`}>{i < step ? '✓' : i+1}</div>
                  {i < 1 && <div className={`w-10 h-0.5 ml-1 ${i < step ? 'bg-green-500' : 'bg-gray-200'}`}/>}
                </div>
              ))}
            </div>

            {step === 0 && (
              <div className="bg-white rounded-2xl card-shadow p-5">
                <h3 className="text-lg font-bold text-gray-800 mb-1">今日の来院目的は？</h3>
                <p className="text-xs text-gray-400 mb-4">該当するものを選択してください</p>
                {[
                  ...(mode === 'hattatsu' ? [{ key: 'screening', label: 'スクリーニング検査のみ', desc: '口唇閉鎖力・舌圧の検査のみ実施', icon: '🔬' }] : []),
                  { key: 'first', label: '初回検査', desc: '初めて口腔機能の検査を行う', icon: '🔍' },
                  { key: 'reeval', label: '再評価', desc: '前回検査から3ヶ月以上経過', icon: '🔄' },
                  { key: 'monthly', label: '継続管理', desc: '毎月の管理・指導', icon: '📋' },
                ].map(opt => (
                  <button key={opt.key} onClick={() => setVisitType(opt.key)}
                    className={`w-full text-left p-4 rounded-xl mb-3 border-2 transition ${
                      visitType === opt.key ? 'border-primary-500 bg-primary-50' : 'border-gray-100 bg-gray-50'
                    }`}>
                    <div className="flex items-center gap-3">
                      <span className="text-2xl">{opt.icon}</span>
                      <div>
                        <div className="font-bold text-gray-800">{opt.label}</div>
                        <div className="text-xs text-gray-500">{opt.desc}</div>
                      </div>
                      {visitType === opt.key && <span className="ml-auto text-primary-600 text-xl">✓</span>}
                    </div>
                  </button>
                ))}
                <button onClick={handleNext} disabled={!visitType}
                  className={`w-full py-3 rounded-xl font-bold text-base mt-2 transition ${
                    visitType ? 'bg-primary-600 text-white active:bg-primary-700' : 'bg-gray-200 text-gray-400'
                  }`}>次へ →</button>
              </div>
            )}

            {step === 1 && (
              <div className="bg-white rounded-2xl card-shadow p-5">
                <h3 className="text-lg font-bold text-gray-800 mb-1">口管強の届出は？</h3>
                <p className="text-xs text-gray-400 mb-4">口腔管理体制強化加算の届出状況</p>
                {[
                  { key: true, label: 'あり', desc: '口管強の届出済み（+50点加算）', icon: '✅' },
                  { key: false, label: 'なし', desc: '届出なし', icon: '➖' },
                ].map(opt => (
                  <button key={String(opt.key)} onClick={() => setHasKoukankyou(opt.key)}
                    className={`w-full text-left p-4 rounded-xl mb-3 border-2 transition ${
                      hasKoukankyou === opt.key ? 'border-primary-500 bg-primary-50' : 'border-gray-100 bg-gray-50'
                    }`}>
                    <div className="flex items-center gap-3">
                      <span className="text-2xl">{opt.icon}</span>
                      <div>
                        <div className="font-bold text-gray-800">{opt.label}</div>
                        <div className="text-xs text-gray-500">{opt.desc}</div>
                      </div>
                      {hasKoukankyou === opt.key && <span className="ml-auto text-primary-600 text-xl">✓</span>}
                    </div>
                  </button>
                ))}
                <button onClick={handleNext} disabled={hasKoukankyou === null}
                  className={`w-full py-3 rounded-xl font-bold text-base mt-2 transition ${
                    hasKoukankyou !== null ? 'bg-primary-600 text-white active:bg-primary-700' : 'bg-gray-200 text-gray-400'
                  }`}>算定項目を表示 →</button>
              </div>
            )}
          </>
        ) : (
          <>
            <div className="bg-white rounded-2xl card-shadow p-5 mb-4">
              <div className="flex items-center gap-2 mb-4">
                <span className="text-xl">📋</span>
                <h3 className="text-lg font-bold text-gray-800">今日の算定可能項目</h3>
              </div>
              <div className="text-xs text-gray-400 mb-3 flex gap-2 flex-wrap">
                <span className="bg-gray-100 px-2 py-1 rounded">{visitType === 'screening' ? 'スクリーニング検査のみ' : visitType === 'first' ? '初回検査' : visitType === 'reeval' ? '再評価' : '継続管理'}</span>
                {visitType !== 'screening' && <span className="bg-gray-100 px-2 py-1 rounded">口管強: {hasKoukankyou ? 'あり' : 'なし'}</span>}
                <span className={`px-2 py-1 rounded font-bold ${diagLevel === 'confirmed' ? 'bg-red-100 text-red-700' : diagLevel === 'managing' ? 'bg-orange-100 text-orange-700' : 'bg-blue-100 text-blue-700'}`}>{diagLabel[diagLevel]}（{positiveCount}項目）</span>
              </div>

              {diagLevel !== 'confirmed' && visitType !== 'screening' && (
                <div className={`border rounded-xl p-3 mb-4 ${diagLevel === 'managing' ? 'bg-orange-50 border-orange-200' : 'bg-blue-50 border-blue-200'}`}>
                  <div className={`text-sm font-bold mb-1 ${diagLevel === 'managing' ? 'text-orange-700' : 'text-blue-700'}`}>
                    {diagLevel === 'managing' ? '📋 管理中（確定診断前）' : '🔍 疑い（検査段階）'}
                  </div>
                  <div className={`text-xs ${diagLevel === 'managing' ? 'text-orange-600' : 'text-blue-600'}`}>
                    {diagLevel === 'managing' ? '歯管＋実地指導は算定可能。口機能・口管強・歯リハ3は確定診断後に算定可能です。' : '検査のみ算定可能です。管理・指導料は算定できません。'}
                  </div>
                </div>
              )}

              {examItems.length > 0 && (
                <div className="mb-4">
                  <div className="text-xs font-bold text-blue-600 tracking-wider mb-2">検査料</div>
                  {examItems.map((item, idx) => (
                    <div key={idx} className="flex items-center justify-between py-2 px-3 bg-blue-50 rounded-lg mb-1">
                      <div className="flex items-center gap-2">
                        <span className="text-blue-500 text-sm">✅</span>
                        <div>
                          <div className="text-sm font-medium text-gray-800">{item.code}</div>
                          {item.note && <div className="text-xs text-gray-400">{item.note}</div>}
                        </div>
                      </div>
                      <div className="text-right shrink-0 ml-2">
                        <div className="text-sm font-bold text-blue-700">{item.points}点</div>
                        <div className="text-xs text-gray-400">{item.freq}</div>
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {mgmtItems.length > 0 && <div className="mb-4">
                <div className="text-xs font-bold text-green-600 tracking-wider mb-2">管理・指導料</div>
                {mgmtItems.map((item, idx) => (
                  <div key={idx} className="flex items-center justify-between py-2 px-3 bg-green-50 rounded-lg mb-1">
                    <div className="flex items-center gap-2">
                      <span className="text-green-500 text-sm">✅</span>
                      <div>
                        <div className="text-sm font-medium text-gray-800">{item.code}</div>
                        {item.note && <div className="text-xs text-gray-400">{item.note}</div>}
                      </div>
                    </div>
                    <div className="text-right shrink-0 ml-2">
                      <div className="text-sm font-bold text-green-700">{item.points}点</div>
                      <div className="text-xs text-gray-400">{item.freq}</div>
                    </div>
                  </div>
                ))}
              </div>}

              <div className="border-t-2 border-gray-100 pt-3 mt-3 flex justify-between items-center">
                <div className="text-sm font-bold text-gray-600">合計（1回の来院で）</div>
                <div className="text-2xl font-black text-primary-700">{totalPoints}点</div>

            <div className="bg-amber-50 border border-amber-200 rounded-2xl p-4 mb-4">
              <div className="flex items-center gap-2 mb-2">

                <div key={i} className="text-xs text-amber-700 py-1 flex items-start gap-1">

            {latest && (
              <div className="bg-blue-50 border border-blue-200 rounded-2xl p-4 mb-4">
                <div className="flex items-center gap-2 mb-2">
                  <span>🤖</span>
                  <h4 className="text-sm font-bold text-blue-800">アプリデータ参考</h4>
                </div>
                <div className="text-xs text-blue-700 space-y-1">
                  <div>最新評価: {formatDate(latest.date)} — 陽性 {positiveCount}/{mode === 'kaika' ? 7 : 17}項目</div>
                  <div>→ {diagLabel[diagLevel]}</div>
                  {mode === 'kaika' && k3Subtype && <div>K3検査法: {k3Subtype === 'force' ? 'デンタルプレスケール（咬合圧）' : '残存歯数'}</div>}
                </div>

            <button onClick={() => { setStep(0); setVisitType(null); setHasKoukankyou(null); setShowResult(false); }}
              className="w-full py-3 rounded-xl font-bold text-base bg-gray-100 text-gray-600 active:bg-gray-200 transition mb-4">
              🔄 はじめからやり直す
            </button>
          </>
        )}
      </div>
    </div>
  );
}

// --- Patient Detail ---
function PatientDetail({ patient, assessments, screenings, onBack, onEdit, onNewAssessment, onSelectAssessment, onDeleteAssessment, onBillingGuide, onScreening, mode }) {
  const [showGraphs, setShowGraphs] = useState(false);
  const [deleteHold, setDeleteHold] = useState(null);
  const [deleteProgress, setDeleteProgress] = useState(0);
  const deleteTimerRef = useRef(null);
  const deleteStartRef = useRef(null);
  const DELETE_DURATION = 2000;
  const handleDeleteStart = (aId) => {
    setDeleteHold(aId);
    deleteStartRef.current = Date.now();
    const animate = () => {
      const elapsed = Date.now() - deleteStartRef.current;
      const progress = Math.min(elapsed / DELETE_DURATION, 1);
      setDeleteProgress(progress);
      if (progress >= 1) { onDeleteAssessment(aId); setDeleteHold(null); setDeleteProgress(0); return; }
      deleteTimerRef.current = requestAnimationFrame(animate);
    };
    deleteTimerRef.current = requestAnimationFrame(animate);
  };
  const handleDeleteEnd = () => {
    if (deleteTimerRef.current) { cancelAnimationFrame(deleteTimerRef.current); deleteTimerRef.current = null; }
    setDeleteHold(null); setDeleteProgress(0);
  };
  const age = calcAge(patient.birthDate);
  const patientAssessments = assessments.filter(a => a.patientId === patient.id).sort((a,b) => new Date(b.date) - new Date(a.date));
  const patientScreenings = (screenings || []).filter(s => s.patientId === patient.id).sort((a,b) => new Date(b.date) - new Date(a.date));

  return (
    <div className="min-h-screen bg-gray-50">
      <Header title="患者詳細" onBack={onBack} rightAction={
        <button onClick={onEdit} className="toggle-btn text-primary-600 font-medium text-sm">編集</button>
      }/>
      <div className="p-4 max-w-2xl mx-auto">
        <div className="bg-white rounded-2xl card-shadow p-4 mb-4">
          <div className="flex justify-between items-start">
            <div>
              <div className="text-xl font-bold text-gray-800">{patient.name}</div>
              <div className="text-sm text-gray-500 mt-1">{age !== null ? `${age}歳` : ''} {patient.sex==='M'?(mode==='kaika'?'男性':'男児'):patient.sex==='F'?(mode==='kaika'?'女性':'女児'):''}</div>
            </div>
            {patient.patientId && <span className="text-xs text-gray-400">ID: {patient.patientId}</span>}
          </div>
          <div className="grid grid-cols-2 gap-2 mt-3 text-sm">
            <div className="text-gray-500">体重: <span className="text-gray-800">{patient.weight || '-'} kg</span></div>
            <div className="text-gray-500">身長: <span className="text-gray-800">{patient.height || '-'} cm</span></div>
            <div className="text-gray-500">保護者: <span className="text-gray-800">{patient.guardianName || '-'}</span></div>
            <div className="text-gray-500">担当医: <span className="text-gray-800">{patient.doctor || '-'}</span></div>
          </div>
        </div>

        <button onClick={onNewAssessment} className="w-full bg-primary-600 text-white py-4 rounded-2xl font-bold text-base mb-3 active:bg-primary-700 transition card-shadow">
          ＋ 新しい評価を開始
        </button>

        {mode === 'hattatsu' && (
          <button onClick={onScreening} className="w-full bg-blue-500 text-white py-3 rounded-2xl font-bold text-base mb-3 active:bg-blue-600 transition card-shadow flex items-center justify-center gap-2">
            <span>🔬</span> スクリーニング検査（口唇閉鎖力・舌圧）
          </button>
        )}

        <button onClick={onBillingGuide} className="w-full bg-amber-500 text-white py-3 rounded-2xl font-bold text-base mb-4 active:bg-amber-600 transition card-shadow flex items-center justify-center gap-2">
          <span>💰</span> 算定ガイド
        </button>

        {patientAssessments.length >= 2 && (
          <div className="mb-4">
            <button onClick={() => setShowGraphs(!showGraphs)}
              className="w-full bg-white rounded-2xl card-shadow p-3 flex items-center justify-between active:bg-gray-50 transition">
              <div className="flex items-center gap-2">
                <span>📈</span>
                <span className="text-sm font-bold text-gray-700">経過記録グラフ</span>
              </div>
              <span className={`text-gray-400 transition-transform ${showGraphs ? 'rotate-180' : ''}`}>▼</span>
            </button>
            {showGraphs && (
              mode === 'kaika'
                ? <KaikaProgressGraphs assessments={[...patientAssessments].reverse()} />
                : <HattatsuProgressGraphs assessments={[...patientAssessments].reverse()} />
            )}
          </div>
        )}

        <h3 className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 px-1">評価履歴</h3>
        {patientAssessments.length === 0 ? (
          <div className="bg-white rounded-2xl card-shadow p-8 text-center text-gray-400 text-sm">まだ評価記録がありません</div>
        ) : patientAssessments.map(a => {
          const checkedCount = a.kaikaItems ? Object.values(a.kaikaItems).filter(i => i.positive).length : (a.checks ? Object.entries(a.checks).filter(([k,v])=>{
            if(k==='C11') return v&&v.length>0;
            if(k==='C13') return v==='underweight'||v==='overweight';
            if(k==='C17') return v&&v.length>0;
            return v===true;
          }).length : (a.items ? Object.values(a.items).filter(i => i.positive).length : 0));
          return (
            <div key={a.id} className="flex items-center gap-2 mb-3">
              <button onClick={()=>onSelectAssessment(a)} className="flex-1 text-left bg-white rounded-2xl p-4 card-shadow active:bg-gray-50 transition">
                <div className="flex justify-between items-center">
                  <div className="text-sm font-medium text-gray-800">{formatDate(a.date)}</div>
                  <div className="flex items-center gap-2">
                    {a.plans && Object.keys(a.plans).length > 0 && <span className="text-green-600 text-xs font-medium">保存済み</span>}
                    <span className="bg-red-50 text-red-600 text-xs font-bold px-2 py-1 rounded-lg">該当 {checkedCount}項目</span>
                  </div>
                </div>
              </button>
              <button
                onTouchStart={()=>handleDeleteStart(a.id)} onTouchEnd={handleDeleteEnd} onTouchCancel={handleDeleteEnd}
                onMouseDown={()=>handleDeleteStart(a.id)} onMouseUp={handleDeleteEnd} onMouseLeave={handleDeleteEnd}
                className="relative overflow-hidden toggle-btn px-3 py-3 rounded-xl text-xs font-medium bg-red-50 text-red-500 border border-red-200 select-none shrink-0"
                style={{WebkitUserSelect:'none',userSelect:'none'}}
              >
                {deleteHold === a.id && deleteProgress > 0 && (
                  <div className="absolute inset-0 bg-red-500 opacity-30" style={{width:`${deleteProgress*100}%`,transition:'none'}}/>
                )}
                <span className="relative z-10">{deleteHold === a.id && deleteProgress > 0 ? '削除中...' : '削除'}</span>
              </button>
            </div>
          );
        })}

        {mode === 'hattatsu' && (
          <>
            <h3 className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 mt-6 px-1">🔬 スクリーニング検査履歴</h3>
            {patientScreenings.length === 0 ? (
              <div className="bg-white rounded-2xl card-shadow p-6 text-center text-gray-400 text-sm">まだスクリーニング記録がありません</div>
            ) : patientScreenings.map(s => (
              <div key={s.id} className="bg-white rounded-2xl card-shadow p-4 mb-2">
                <div className="flex justify-between items-center mb-2">
                  <span className="text-sm font-medium text-gray-800">{formatDate(s.date)}</span>
                  <div className="flex gap-1">
                    {s.lipPositive && <span className="bg-red-50 text-red-600 text-xs font-bold px-2 py-0.5 rounded-lg">口唇↓</span>}
                    {s.tonguePositive && <span className="bg-red-50 text-red-600 text-xs font-bold px-2 py-0.5 rounded-lg">舌圧↓</span>}
                    {!s.lipPositive && !s.tonguePositive && <span className="bg-green-50 text-green-600 text-xs font-bold px-2 py-0.5 rounded-lg">正常</span>}
                  </div>
                </div>
                <div className="grid grid-cols-2 gap-4 text-sm">
                  <div>
                    <span className="text-xs text-gray-400">口唇閉鎖力</span>
                    <div className={s.lipPositive ? 'text-red-500 font-bold' : 'text-gray-700'}>{s.lipForce ? `${s.lipForce} N` : '—'}</div>
                  </div>
                  <div>
                    <span className="text-xs text-gray-400">舌圧</span>
                    <div className={s.tonguePositive ? 'text-red-500 font-bold' : 'text-gray-700'}>{s.tonguePressure ? `${s.tonguePressure} kPa` : '—'}</div>
                  </div>
                </div>
              </div>
            ))}
          </>
        )}
      </div>
    </div>
  );
}

// ==================== APP ====================
function App() {
  const [pin, setPin] = useState(null);
  const [data, setData] = useState({ patients: [], assessments: [], screenings: [] });
  const [ready, setReady] = useState(false);
  const [page, setPage] = useState('list');
  const [mode, setMode] = useState(null);
  const [currentPatient, setCurrentPatient] = useState(null);
  const [currentAssessment, setCurrentAssessment] = useState(null);
  const [editingPatient, setEditingPatient] = useState(null);
  const firestoreListenersRef = useRef([]);

  const handleAuth = async (enteredPin) => {
    setPin(enteredPin);
    // migrate legacy unencrypted data if exists
    const legacy = getLegacyData();
    let initialData = { patients: [], assessments: [], screenings: [] };

    if (legacy && (legacy.patients.length > 0 || legacy.assessments.length > 0)) {
      initialData = { ...legacy, screenings: legacy.screenings || [] };
      await encryptData(initialData, enteredPin);
      localStorage.removeItem('oralFuncData');
    } else {
      try { const d = await decryptData(enteredPin); initialData = { ...d, screenings: d.screenings || [] }; } catch { initialData = { patients: [], assessments: [], screenings: [] }; }
    }

    // Try to load from Firestore first, fall back to local encrypted data
    if (firebaseReady && db) {
      const firestoreData = await loadDataFromFirestore();
      if (firestoreData && (firestoreData.patients.length > 0 || firestoreData.assessments.length > 0)) {
        initialData = { ...firestoreData, screenings: firestoreData.screenings || [] };
      }
    }

    setData(initialData);
    setReady(true);
  };

  // Setup Firestore real-time listeners
  useEffect(() => {
    if (!pin || !ready || !firebaseReady || !db) return;

    // Cleanup previous listeners
    firestoreListenersRef.current.forEach(unsubscribe => unsubscribe());
    firestoreListenersRef.current = [];

    // Listen to patients collection
    const unsubPatients = db.collection('patients').onSnapshot(snapshot => {
      const patients = [];
      snapshot.forEach(doc => patients.push(doc.data()));
      setData(prev => ({ ...prev, patients }));
    }, error => {
      console.warn('Error listening to patients:', error);
    });

    // Listen to assessments collection
    const unsubAssessments = db.collection('assessments').onSnapshot(snapshot => {
      const assessments = [];
      snapshot.forEach(doc => assessments.push(doc.data()));
      setData(prev => ({ ...prev, assessments }));
    }, error => {
      console.warn('Error listening to assessments:', error);
    });

    firestoreListenersRef.current = [unsubPatients, unsubAssessments];

    return () => {
      firestoreListenersRef.current.forEach(unsubscribe => unsubscribe());
    };
  }, [pin, ready]);

  // Save encrypted data to localStorage whenever data changes (offline backup)
  useEffect(() => { if (pin && ready) { encryptData(data, pin); } }, [data, pin, ready]);

  if (!pin) return <PinScreen onAuth={handleAuth}/>;
  if (!ready) return <div className="min-h-screen flex items-center justify-center"><p className="text-gray-400">読み込み中...</p></div>;
  if (!mode) return <HomeScreen onSelectMode={m => { setMode(m); setPage('list'); }}/>

  const savePatient = (p) => {
    if (!p.mode) p.mode = mode;
    setData(prev => {
      const exists = prev.patients.find(x => x.id === p.id);
      if (exists) {
        return { ...prev, patients: prev.patients.map(x => x.id === p.id ? p : x) };
      }
      return { ...prev, patients: [...prev.patients, p] };
    });
    // Sync to Firestore
    savePatientToFirestore(p);
    setCurrentPatient(p);
    setPage('detail');
  };

  const saveAssessment = (a) => {
    setData(prev => {
      const exists = prev.assessments.find(x => x.id === a.id);
      if (exists) {
        return { ...prev, assessments: prev.assessments.map(x => x.id === a.id ? a : x) };
      }
      return { ...prev, assessments: [...prev.assessments, a] };
    });
    // Sync to Firestore
    saveAssessmentToFirestore(a);
    setCurrentAssessment(a);
    setPage('plan');
  };

  const savePlan = (a) => {
    setData(prev => ({
      ...prev,
      assessments: prev.assessments.map(x => x.id === a.id ? a : x)
    }));
    // Sync to Firestore
    saveAssessmentToFirestore(a);
    setCurrentAssessment(a);
  };

  const deleteAssessment = (aId) => {
    setData(prev => ({
      ...prev,
      assessments: prev.assessments.filter(a => a.id !== aId)
    }));
    // Delete from Firestore
    try { db.collection('assessments').doc(aId).delete(); } catch(e) { console.log('Firestore delete error', e); }
  };

  const handleRestore = async (backupData) => {
    // Update local state
    setData({ patients: backupData.patients, assessments: backupData.assessments });
    // Sync each patient and assessment to Firestore
    if (firebaseReady && db) {
      for (const p of backupData.patients) {
        await savePatientToFirestore(p);
      }
      for (const a of backupData.assessments) {
        await saveAssessmentToFirestore(a);
      }
    }
  };

  const deletePatient = (id) => {
    if(!confirm('この患者データを削除しますか？')) return;
    setData(prev => ({
      patients: prev.patients.filter(p => p.id !== id),
      assessments: prev.assessments.filter(a => a.patientId !== id)
    }));
    // Delete from Firestore
    deletePatientFromFirestore(id);
    setPage('list');
  };

  if (page === 'print' && currentPatient && currentAssessment) {
    return <PrintView patient={currentPatient} assessment={currentAssessment} onClose={()=>setPage('plan')} mode={mode}/>;
  }

  if (page === 'referral' && currentPatient && currentAssessment) {
    return <ReferralLetter patient={currentPatient} assessment={currentAssessment} onClose={()=>setPage('plan')} mode={mode}/>;
  }

  if (page === 'list') {
    return <PatientList patients={data.patients.filter(p => (p.mode || 'hattatsu') === mode)} assessments={data.assessments}
      onSelect={p=>{setCurrentPatient(p);setPage('detail');}}
      onAdd={()=>{setEditingPatient(null);setPage('form');}}
      onRestore={handleRestore}
      onHome={()=>{setMode(null);setPage('list');}}
      mode={mode}/>;
  }

  if (page === 'form') {
    return <PatientForm patient={editingPatient} mode={mode} onSave={savePatient} onCancel={()=>{
      if(currentPatient) setPage('detail'); else setPage('list');
    }}/>;
  }

  if (page === 'billing' && currentPatient) {
    return <BillingFlowChart patient={currentPatient} assessments={data.assessments} mode={mode} onBack={()=>setPage('detail')}/>;
  }

  if (page === 'screening' && currentPatient) {
    return <ScreeningTest patient={currentPatient}
      onBack={()=>setPage('detail')}
      onSave={(screening) => {
        const updated = {...currentPatient, screening};
        setCurrentPatient(updated);
        const screeningRecord = { id: generateId(), patientId: currentPatient.id, ...screening };
        setData(prev => ({
          ...prev,
          patients: prev.patients.map(p => p.id === updated.id ? updated : p),
          screenings: [...(prev.screenings || []), screeningRecord]
        }));
        if (firebaseReady && db) savePatientToFirestore(updated);
      }}
      onGoAssessment={(lip, tongue) => {
        const updated = {...currentPatient, screening: {...currentPatient.screening, lipForce: lip, tonguePressure: tongue}};
        setCurrentPatient(updated);
        setCurrentAssessment(null);
        setPage('assessment');
      }}/>;
  }

  if (page === 'detail' && currentPatient) {
    return <PatientDetail patient={currentPatient} assessments={data.assessments} screenings={data.screenings || []}
      onBack={()=>setPage('list')}
      onEdit={()=>{setEditingPatient(currentPatient);setPage('form');}}
      onNewAssessment={()=>{setCurrentAssessment(null);setPage('assessment');}}
      onSelectAssessment={a=>{setCurrentAssessment(a);setPage('plan');}}
      onDeleteAssessment={deleteAssessment}
      onBillingGuide={()=>setPage('billing')}
      onScreening={()=>setPage('screening')}
      mode={mode}/>;
  }

  if (page === 'assessment' && currentPatient) {
    if (mode === 'kaika') {
      return <KaikaAssessmentForm patient={currentPatient} existingAssessment={currentAssessment}
        onSave={saveAssessment}
        onCancel={()=>setPage('detail')}/>;
    }
    return <AssessmentForm patient={currentPatient} existingAssessment={currentAssessment}
      onSave={saveAssessment}
      onCancel={()=>setPage('detail')}/>;
  }

  if (page === 'plan' && currentPatient && currentAssessment) {
    return <ManagementPlan patient={currentPatient} assessment={currentAssessment}
      onSave={savePlan} onBack={()=>setPage('detail')} onPrint={()=>setPage('print')} onReferral={()=>setPage('referral')} mode={mode}/>;
  }

  return <PatientList patients={data.patients.filter(p => (p.mode || 'hattatsu') === mode)} assessments={data.assessments}
    onSelect={p=>{setCurrentPatient(p);setPage('detail');}}
    onAdd={()=>{setEditingPatient(null);setPage('form');}}
    onRestore={handleRestore}
    onHome={()=>{setMode(null);setPage('list');}}
    mode={mode}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
