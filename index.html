// ==================== UTILITIES ====================
function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function calcAge(birthDate) {
  if (!birthDate) return null;
  const today = new Date();
  const birth = new Date(birthDate);
  let age = today.getFullYear() - birth.getFullYear();
  const m = today.getMonth() - birth.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
  return age;
}

function calcAgeMonths(birthDate) {
  if (!birthDate) return null;
  const today = new Date();
  const birth = new Date(birthDate);
  return (today.getFullYear() - birth.getFullYear()) * 12 + (today.getMonth() - birth.getMonth());
}

function calcKaup(weightKg, heightCm) {
  if (!weightKg || !heightCm) return null;
  return ((weightKg * 10000) / (heightCm * heightCm)).toFixed(1);
}

function calcRohrer(weightKg, heightCm) {
  if (!weightKg || !heightCm) return null;
  return ((weightKg * 10000000) / (heightCm * heightCm * heightCm)).toFixed(1);
}

function getBodyStatus(index, isKaup) {
  if (!index) return 'unknown';
  const v = parseFloat(index);
  if (isKaup) {
    if (v < 15) return 'underweight';
    if (v > 18) return 'overweight';
    return 'normal';
  } else {
    if (v < 115) return 'underweight';
    if (v > 145) return 'overweight';
    return 'normal';
  }
}

function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  return `${dt.getFullYear()}/${(dt.getMonth()+1).toString().padStart(2,'0')}/${dt.getDate().toString().padStart(2,'0')}`;
}

// ==================== CRYPTO ====================
const SALT_KEY = 'oralFuncSalt';
const DATA_KEY = 'oralFuncDataEnc';
const PIN_CHECK_KEY = 'oralFuncPinCheck';

async function deriveCryptoKey(pin, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(pin), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt', 'decrypt']
  );
}

async function encryptData(data, pin) {
  let salt = localStorage.getItem(SALT_KEY);
  if (!salt) { const s = crypto.getRandomValues(new Uint8Array(16)); salt = btoa(String.fromCharCode(...s)); localStorage.setItem(SALT_KEY, salt); }
  const saltBytes = Uint8Array.from(atob(salt), c => c.charCodeAt(0));
  const key = await deriveCryptoKey(pin, saltBytes);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const enc = new TextEncoder();
  const encrypted = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(JSON.stringify(data)));
  const combined = new Uint8Array(iv.length + encrypted.byteLength);
  combined.set(iv, 0);
  combined.set(new Uint8Array(encrypted), iv.length);
  localStorage.setItem(DATA_KEY, btoa(String.fromCharCode(...combined)));
}

async function decryptData(pin) {
  const stored = localStorage.getItem(DATA_KEY);
  if (!stored) return { patients: [], assessments: [] };
  const saltStr = localStorage.getItem(SALT_KEY);
  if (!saltStr) throw new Error('No salt');
  const saltBytes = Uint8Array.from(atob(saltStr), c => c.charCodeAt(0));
  const key = await deriveCryptoKey(pin, saltBytes);
  const combined = Uint8Array.from(atob(stored), c => c.charCodeAt(0));
  const iv = combined.slice(0, 12);
  const ciphertext = combined.slice(12);
  const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
  return JSON.parse(new TextDecoder().decode(decrypted));
}

async function savePinCheck(pin) {
  let salt = localStorage.getItem(SALT_KEY);
  if (!salt) { const s = crypto.getRandomValues(new Uint8Array(16)); salt = btoa(String.fromCharCode(...s)); localStorage.setItem(SALT_KEY, salt); }
  const saltBytes = Uint8Array.from(atob(salt), c => c.charCodeAt(0));
  const key = await deriveCryptoKey(pin, saltBytes);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const enc = new TextEncoder();
  const encrypted = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode('OK'));
  const combined = new Uint8Array(iv.length + encrypted.byteLength);
  combined.set(iv, 0);
  combined.set(new Uint8Array(encrypted), iv.length);
  localStorage.setItem(PIN_CHECK_KEY, btoa(String.fromCharCode(...combined)));
}

async function verifyPin(pin) {
  const stored = localStorage.getItem(PIN_CHECK_KEY);
  if (!stored) return false;
  try {
    const saltStr = localStorage.getItem(SALT_KEY);
    const saltBytes = Uint8Array.from(atob(saltStr), c => c.charCodeAt(0));
    const key = await deriveCryptoKey(pin, saltBytes);
    const combined = Uint8Array.from(atob(stored), c => c.charCodeAt(0));
    const iv = combined.slice(0, 12);
    const ciphertext = combined.slice(12);
    await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
    return true;
  } catch { return false; }
}

function isFirstRun() { return !localStorage.getItem(PIN_CHECK_KEY); }

async function savePatientToFirestore(patient) {
  if (!firebaseReady || !db) return;
  try {
    await db.collection('patients').doc(patient.id).set(patient, { merge: true });
  } catch (e) {
    console.warn('Error saving patient to Firestore:', e);
  }
}

async function saveAssessmentToFirestore(assessment) {
  if (!firebaseReady || !db) return;
  try {
    await db.collection('assessments').doc(assessment.id).set(assessment, { merge: true });
  } catch (e) {
    console.warn('Error saving assessment to Firestore:', e);
  }
}

async function deletePatientFromFirestore(patientId) {
  if (!firebaseReady || !db) return;
  try {
    await db.collection('patients').doc(patientId).delete();
  } catch (e) {
    console.warn('Error deleting patient from Firestore:', e);
  }
}

async function loadDataFromFirestore() {
  if (!firebaseReady || !db) return null;
  try {
    const patientsSnap = await db.collection('patients').get();
    const assessmentsSnap = await db.collection('assessments').get();
    const patients = [];
    const assessments = [];
    patientsSnap.forEach(doc => patients.push(doc.data()));
    assessmentsSnap.forEach(doc => assessments.push(doc.data()));
    return { patients, assessments };
  } catch (e) {
    console.warn('Error loading data from Firestore:', e);
    return null;
  }
}

  return null;
}

function PinScreen({ onAuth }) {
  const first = isFirstRun();
  const [pin, setPin] = useState('');
  const [confirmPin, setConfirmPin] = useState('');
  const [step, setStep] = useState(first ? 'setup' : 'login');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handleSetup = async () => {
    if (pin.length < 4) { setError('4桁以上で入力してください'); return; }
    if (step === 'setup') { setStep('confirm'); setConfirmPin(''); setError(''); return; }
    if (pin !== confirmPin) { setError('PINが一致しません'); setConfirmPin(''); return; }
    setLoading(true);
    await savePinCheck(pin);
    await encryptData({ patients: [], assessments: [] }, pin);
    onAuth(pin);
  };

  const handleLogin = async () => {
    if (!pin) return;
    setLoading(true);
    const ok = await verifyPin(pin);
    if (ok) { onAuth(pin); }
    else { setError('PINが正しくありません'); setPin(''); setLoading(false); }
  };

  return (
    <div className="min-h-screen bg-gradient-to-b from-blue-50 to-white flex items-center justify-center p-4">
      <div className="bg-white rounded-3xl card-shadow p-8 w-full max-w-sm text-center">
        <div className="text-4xl mb-4">🦷</div>
        <h1 className="text-xl font-bold text-gray-800 mb-1">OralCare Pro</h1>
        <h2 className="text-sm text-gray-500 mb-6">口腔機能管理アプリ</h2>
        {step === 'setup' && (
          <>
            <p className="text-sm text-gray-600 mb-4">初期設定：PINを設定してください</p>
            <input type="password" inputMode="numeric" pattern="[0-9]*" maxLength={8}
              value={pin} onChange={e=>{ setPin(e.target.value.replace(/\D/g,'')); setError(''); }}
              className="w-full text-center text-2xl tracking-[0.5em] px-4 py-4 bg-gray-50 border border-gray-200 rounded-2xl mb-3"
              placeholder="PIN" autoFocus/>
            {error && <p className="text-red-500 text-sm mb-3">{error}</p>}
            <button onClick={handleSetup} disabled={loading || pin.length<4}
              className="w-full py-4 bg-primary-600 text-white rounded-2xl font-bold text-base disabled:opacity-40">
              次へ
            </button>
          </>
        )}
        {step === 'confirm' && (
          <>
            <p className="text-sm text-gray-600 mb-4">確認：同じPINをもう一度入力</p>
            <input type="password" inputMode="numeric" pattern="[0-9]*" maxLength={8}
              value={confirmPin} onChange={e=>{ setConfirmPin(e.target.value.replace(/\D/g,'')); setError(''); }}
              className="w-full text-center text-2xl tracking-[0.5em] px-4 py-4 bg-gray-50 border border-gray-200 rounded-2xl mb-3"
              placeholder="PIN確認" autoFocus/>
            {error && <p className="text-red-500 text-sm mb-3">{error}</p>}
            <button onClick={handleSetup} disabled={loading || confirmPin.length<4}
              className="w-full py-4 bg-primary-600 text-white rounded-2xl font-bold text-base disabled:opacity-40">
              {loading ? '設定中...' : '設定完了'}
            </button>
          </>
        )}
        {step === 'login' && (
          <>
            <p className="text-sm text-gray-600 mb-4">PINを入力してください</p>
            <input type="password" inputMode="numeric" pattern="[0-9]*" maxLength={8}

function LongPressButton({ onAction, className, children, label }) {
  const [progress, setProgress] = useState(0);
  const timerRef = useRef(null);
  const startRef = useRef(null);
  const DURATION = 2000;
  const start = () => {
    startRef.current = Date.now();
    const animate = () => {
      const elapsed = Date.now() - startRef.current;
      const p = Math.min(elapsed / DURATION, 1);
      setProgress(p);
      if (p >= 1) { onAction(); setProgress(0); return; }
      timerRef.current = requestAnimationFrame(animate);
    };
    timerRef.current = requestAnimationFrame(animate);
  };
  const end = () => {
    if (timerRef.current) { cancelAnimationFrame(timerRef.current); timerRef.current = null; }
    setProgress(0);
  };
  return (
    <button onTouchStart={start} onTouchEnd={end} onTouchCancel={end}
      onMouseDown={start} onMouseUp={end} onMouseLeave={end}
      className={`relative overflow-hidden select-none ${className}`}
      style={{WebkitUserSelect:'none',userSelect:'none'}}>
      {progress > 0 && <div className="absolute inset-0 bg-white opacity-30" style={{width:`${progress*100}%`,transition:'none'}}/>}
      <span className="relative z-10">{progress > 0 ? `${Math.round(progress*100)}%...` : (label || children)}</span>
    </button>
  );
}

function PatientList({ patients, assessments, onSelect, onAdd, onRestore, mode, onHome }) {
  const [search, setSearch] = useState('');
  const [showBackupMenu, setShowBackupMenu] = useState(false);
  const [backupMsg, setBackupMsg] = useState('');
  const lastBackup = localStorage.getItem('lastBackupDate');
  const modePatients = patients.filter(p => (p.mode||'hattatsu') === mode);
  const filtered = modePatients.filter(p => p.name.includes(search) || (p.patientId||'').includes(search));

  const handleBackup = () => {
    const backupData = {
      version: 2,
      exportDate: new Date().toISOString(),
      patients: patients,
      assessments: assessments
    };
    const json = JSON.stringify(backupData, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const dateStr = new Date().toISOString().slice(0,10).replace(/-/g,'');
    a.href = url;
    a.download = `oral-care-backup-${dateStr}.json`;
    a.click();
    URL.revokeObjectURL(url);
    const now = new Date().toLocaleString('ja-JP');
    localStorage.setItem('lastBackupDate', now);
    setBackupMsg('バックアップを保存しました');
    setShowBackupMenu(false);
    setTimeout(() => setBackupMsg(''), 3000);
  };

  const handleRestore = () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const backupData = JSON.parse(ev.target.result);
          if (!backupData.patients || !backupData.assessments) {
            alert('無効なバックアップファイルです');
            return;
          }
          if (confirm(`${backupData.patients.length}名の患者データ、${backupData.assessments.length}件の評価データを復元します。\n現在のデータは上書きされます。よろしいですか？`)) {
            onRestore(backupData);
            setBackupMsg('データを復元しました');
            setShowBackupMenu(false);
            setTimeout(() => setBackupMsg(''), 3000);
          }
        } catch(err) {
          alert('ファイルの読み込みに失敗しました: ' + err.message);
        }
      };
      reader.readAsText(file);
    };
    input.click();
  };

  const title = mode === 'kaika' ? '口腔機能低下症 患者管理' : '口腔機能発達不全症 患者管理';
  const variant = mode === 'kaika' ? 'kaika' : 'hattatsu';

  return (
    <div className="min-h-screen bg-gray-50">
      <Header title={title} onBack={onHome} variant={variant} rightAction={
        <div className="flex gap-2">
          <button onClick={()=>setShowBackupMenu(!showBackupMenu)} className="toggle-btn bg-white bg-opacity-20 text-white px-3 py-2 rounded-xl font-medium text-sm">⚙</button>
          <button onClick={onAdd} className="toggle-btn bg-white text-gray-800 px-4 py-2 rounded-xl font-medium text-sm">＋ 新規患者</button>
        </div>
      }/>
      {backupMsg && (
        <div className="mx-4 mt-2 bg-green-100 text-green-700 text-sm px-4 py-2 rounded-xl text-center font-medium">{backupMsg}</div>
      )}
      {showBackupMenu && (
        <div className="mx-4 mt-2 bg-white rounded-2xl card-shadow p-4">
          <div className="text-sm font-bold text-gray-700 mb-3">データ管理</div>
          {lastBackup && (
            <div className="text-xs text-gray-400 mb-3">最終バックアップ: {lastBackup}</div>
          )}
          <div className="flex gap-2">
            <button onClick={handleBackup} className="flex-1 toggle-btn bg-blue-500 text-white px-4 py-2 rounded-xl font-medium text-sm">バックアップ</button>
            <button onClick={handleRestore} className="flex-1 toggle-btn bg-orange-500 text-white px-4 py-2 rounded-xl font-medium text-sm">復元</button>
          </div>
          <div className="text-xs text-gray-400 mt-2">バックアップ: JSONファイルとして保存　復元: JSONファイルから読み込み</div>
        </div>
      )}
      <div className="p-4 max-w-2xl mx-auto">
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="患者名・IDで検索..."
          className="w-full px-4 py-3 bg-white border border-gray-200 rounded-xl text-base mb-4"/>
        {filtered.length === 0 ? (
          <div className="text-center py-16 text-gray-400">
            <svg className="w-16 h-16 mx-auto mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            <p className="text-lg font-medium mb-2">患者データがありません</p>
            <p className="text-sm">「＋ 新規患者」から登録してください</p>
          </div>
        ) : filtered.map(p => {
          const age = calcAge(p.birthDate);
          const asmts = assessments.filter(a => a.patientId === p.id);
          const lastAsmt = asmts.length > 0 ? asmts[asmts.length-1] : null;

          let checkedCount = 0;
          if (mode === 'kaika' && lastAsmt) {
            checkedCount = Object.entries(lastAsmt.kaikaItems||{}).filter(([k,v]) => v === true).length;
          } else if (lastAsmt) {
            checkedCount = Object.entries(lastAsmt.checks).filter(([k,v]) => {
              if (k === 'C11') return v && v.length > 0;
              if (k === 'C13') return v === 'underweight' || v === 'overweight';
              if (k === 'C17') return v && v.length > 0;
              return v === true;
            }).length;
          }

          return (
            <button key={p.id} onClick={()=>onSelect(p)} className="w-full text-left bg-white rounded-2xl p-4 mb-3 card-shadow active:bg-gray-50 transition">
              <div className="flex justify-between items-start">
                <div>
                  <div className="font-bold text-gray-800 text-base">{p.name}</div>
                  <div className="text-sm text-gray-500 mt-1">{age !== null ? `${age}歳` : ''} {p.sex === 'M' ? '男' : p.sex === 'F' ? '女' : ''}</div>
                </div>
                <div className="text-right">
                  {lastAsmt && <span className={`inline-block text-xs font-bold px-2 py-1 rounded-lg ${mode === 'kaika' ? 'bg-kaika-50 text-kaika-600' : 'bg-red-50 text-red-600'}`}>該当 {checkedCount}項目</span>}
                </div>
              </div>
              {lastAsmt && <div className="text-xs text-gray-400 mt-2">最終評価: {formatDate(lastAsmt.date)}</div>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ==================== KAIKA (口腔機能低下症) ASSESSMENT ====================
function KaikaAssessmentForm({ patient, existingAssessment, onSave, onCancel }) {
  const [kaikaItems, setKaikaItems] = useState(existingAssessment?.kaikaItems || {
    K1: { value: '', positive: false },
    K2: { value: '', positive: false },
    K3: { value: '', subtype: 'teeth', positive: false },
    K4: { pa: '', ta: '', ka: '', positive: false },
    K5: { value: '', positive: false },
    K6: { value: '', positive: false },
    K7: { value: '', subtype: 'eat10', positive: false }
  });
  const [notes, setNotes] = useState(existingAssessment?.notes || '');

  const updateItem = (code, field, val) => {
    setKaikaItems(prev => ({...prev, [code]: {...prev[code], [field]: val}}));
  };

  const updatePositive = (code) => {
    const item = kaikaItems[code];
    let isPositive = false;

    if (code === 'K1') isPositive = parseFloat(item.value) >= 50;
    else if (code === 'K2') isPositive = parseFloat(item.value) < 27;
    else if (code === 'K3') isPositive = item.subtype === 'teeth' ? parseFloat(item.value) < 20 : parseFloat(item.value) < 200;
    else if (code === 'K4') isPositive = [item.pa, item.ta, item.ka].some(v => parseFloat(v) < 6);
    else if (code === 'K5') isPositive = parseFloat(item.value) < 30;
    else if (code === 'K6') isPositive = parseFloat(item.value) < 100;
    else if (code === 'K7') isPositive = item.subtype === 'eat10' ? parseFloat(item.value) >= 3 : true;

    updateItem(code, 'positive', isPositive);
  };

  const posCount = Object.values(kaikaItems).filter(item => item.positive).length;
  const haKaikaShogai = posCount >= 3;

  const handleSave = () => {
    Object.keys(kaikaItems).forEach(code => updatePositive(code));
    onSave({
      id: existingAssessment?.id || generateId(),
      patientId: patient.id,
      date: new Date().toISOString().split('T')[0],
      kaikaItems,
      kaikaResult: haKaikaShogai,
      notes,
      plans: {}
    });
  };

  return (
    <div className="min-h-screen bg-gray-50">
      <Header title="口腔機能低下症 評価" onBack={onCancel} variant="kaika" rightAction={
        <button onClick={handleSave} className="toggle-btn bg-white text-gray-800 px-4 py-2 rounded-xl font-medium text-sm">次へ →</button>

        <div className={`rounded-xl p-3 mb-4 text-sm font-medium ${haKaikaShogai ? 'bg-kaika-50 text-kaika-700 border border-kaika-200' : 'bg-gray-50 text-gray-700'}`}>
          該当項目: <span className="font-bold">{posCount}/7</span> {haKaikaShogai && '→ 口腔機能低下症に該当します'}
        </div>

        {KAIKA_ITEMS.map((item) => {
          const data = kaikaItems[item.code];
          return (
            <div key={item.code} className="bg-white rounded-2xl card-shadow mb-4 p-4">
              <div className={`flex items-center gap-2 mb-3 pb-3 border-b ${data.positive ? 'border-kaika-200' : 'border-gray-100'}`}>
                <span className="inline-block bg-gray-100 text-gray-600 text-xs font-bold px-2 py-1 rounded">{item.code}</span>
                <div className="flex-1">
                  <div className="font-bold text-gray-800 text-sm">{item.label}</div>
                  <div className="text-xs text-gray-500">{item.shortLabel}</div>
                </div>
                {data.positive && <span className="text-kaika-600 font-bold text-sm">+ 陽性</span>}

                  <input type="number" value={data.value} onChange={e=>{updateItem('K1','value',e.target.value);updatePositive('K1');}}

              )}

              {item.code === 'K6' && (
                <div className="space-y-2">
                  <label className="text-xs text-gray-500">グルコース測定 < 100 mg/dl = 陽性</label>
                  <input type="number" value={data.value} onChange={e=>{updateItem('K6','value',e.target.value);updatePositive('K6');}}
                    className={inputCls} placeholder="mg/dl"/>
                </div>
              )}

              {item.code === 'K7' && (
                <div className="space-y-2">
                  <div className="flex gap-2 mb-2">
                    <button onClick={()=>{updateItem('K7','subtype','eat10');updatePositive('K7');}}
                      className={`flex-1 py-2 rounded-lg text-sm font-medium transition ${data.subtype==='eat10'?'bg-kaika-600 text-white':'bg-gray-100 text-gray-600'}`}>
                      EAT-10 (≥3)
                    </button>
                    <button onClick={()=>{updateItem('K7','subtype','rsst');updatePositive('K7');}}
                      className={`flex-1 py-2 rounded-lg text-sm font-medium transition ${data.subtype==='rsst'?'bg-kaika-600 text-white':'bg-gray-100 text-gray-600'}`}>
                      RSST
                    </button>
                  </div>
                  {data.subtype === 'eat10' && (
                    <input type="number" value={data.value} onChange={e=>{updateItem('K7','value',e.target.value);updatePositive('K7');}}
                      className={inputCls} placeholder="スコア（0-40）" min="0" max="40"/>
                  )}
                </div>
              )}
            </div>
          );
        })}

        <div className="bg-white rounded-2xl card-shadow p-4 mb-4">
          <label className="text-xs font-medium text-gray-500 block mb-1">追加所見・メモ</label>
          <textarea value={notes} onChange={e=>setNotes(e.target.value)}
            className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm resize-none" rows={3} placeholder="自由記載..."/>
        </div>
      </div>
    </div>
  );
}

// ==================== HATTATSU (発達不全症) ASSESSMENT ====================
function HattatsuAssessmentForm({ patient, existingAssessment, onSave, onCancel }) {
  const age = calcAge(patient.birthDate);
  const isKaup = age !== null && age < 6;
  const idx = isKaup ? calcKaup(parseFloat(patient.weight), parseFloat(patient.height)) : calcRohrer(parseFloat(patient.weight), parseFloat(patient.height));
  const bodyStatus = getBodyStatus(idx, isKaup);

  const [checks, setChecks] = useState(existingAssessment?.checks || {
    C1:false,C2:false,C3:false,C4:false,C5:false,C6:false,C7:false,C8:false,
    C9:false,C10:false,C11:[],C11_has:existingAssessment?.checks?.C11?.length > 0 ? true : null,C12:false,C13:bodyStatus,C13_patient:null,C14:false,C15:false,C16:false,C17:''
  });
  const [lipForce, setLipForce] = useState(existingAssessment?.lipForce || '');
  const [tonguePressure, setTonguePressure] = useState(existingAssessment?.tonguePressure || '');
  const [patientMode, setPatientMode] = useState(false);
  const [holdProgress, setHoldProgress] = useState(0);
  const holdTimerRef = useRef(null);
  const holdStartRef = useRef(null);
  const HOLD_DURATION = 2000;

  const handleModeToggle = () => {};
  const handleHoldStart = () => {
    holdStartRef.current = Date.now();
    const targetMode = !patientMode;
    const animate = () => {
      const elapsed = Date.now() - holdStartRef.current;
      const progress = Math.min(elapsed / HOLD_DURATION, 1);
      setHoldProgress(progress);
      if (progress >= 1) { setPatientMode(targetMode); setHoldProgress(0); return; }
      holdTimerRef.current = requestAnimationFrame(animate);
    };
    holdTimerRef.current = requestAnimationFrame(animate);
  };
  const handleHoldEnd = () => {
    if (holdTimerRef.current) { cancelAnimationFrame(holdTimerRef.current); holdTimerRef.current = null; }
    setHoldProgress(0);
  };

  const toggle = (code) => setChecks(prev => ({...prev, [code]: !prev[code]}));
  const toggleHabit = (habit) => {
    setChecks(prev => {
      const cur = prev.C11 || [];
      return {...prev, C11: cur.includes(habit) ? cur.filter(h=>h!==habit) : [...cur, habit]};
    });
  };

  useEffect(() => { setChecks(prev => ({...prev, C13: bodyStatus})); }, [bodyStatus]);

  const handleSave = () => {
    onSave({
      id: existingAssessment?.id || generateId(),
      patientId: patient.id,
      date: new Date().toISOString().split('T')[0],
      checks, lipForce, tonguePressure,
      plans: {}
    });
  };

  const categories = ['chew','swallow','eat','speak','body','other'];
  const filteredItems = patientMode ? CHECK_ITEMS_HATTATSU.filter(i => i.type === 'patient') : CHECK_ITEMS_HATTATSU;

  return (
    <div className="min-h-screen bg-gray-50">
      <Header title={patientMode ? "問診（患者さま用）" : "口腔機能評価チェックシート"} onBack={onCancel} variant="hattatsu" rightAction={
        <div className="flex gap-2">
          <button
            onClick={handleModeToggle}
            onTouchStart={handleHoldStart} onTouchEnd={handleHoldEnd} onTouchCancel={handleHoldEnd}
            onMouseDown={handleHoldStart} onMouseUp={handleHoldEnd} onMouseLeave={handleHoldEnd}
            className={`toggle-btn px-3 py-2 rounded-xl text-xs font-medium border relative overflow-hidden select-none ${patientMode?'bg-orange-600 text-white border-orange-600':'bg-orange-500 text-white border-orange-500'}`}
            style={{WebkitUserSelect:'none',userSelect:'none'}}
          >
            {holdProgress > 0 && (
              <div className={`absolute inset-0 opacity-40`} style={{background:patientMode ? 'blue' : 'yellow', width:`${holdProgress*100}%`,transition:'none'}}/>
            )}
            <span className="relative z-10">{holdProgress > 0 ? `切替中... ${Math.round(holdProgress*100)}%` : (patientMode ? '医院モードへ' : '患者モードへ')}</span>
          </button>
          <button onClick={handleSave} className="toggle-btn bg-white text-gray-800 px-4 py-2 rounded-xl font-medium text-sm">次へ →</button>
        </div>
      }/>
      <div className="p-4 max-w-2xl mx-auto">
        <div className="bg-primary-50 rounded-xl p-3 mb-4 text-sm text-primary-700">
          <span className="font-bold">{patient.name}</span>（{age}歳）の評価
        </div>

        {categories.map(cat => {
          const items = filteredItems.filter(i => i.category === cat);
          if (items.length === 0) return null;
          return (
            <div key={cat} className="mb-4">
              <h3 className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 px-1">{CATEGORY_LABELS_HATTATSU[cat]}</h3>
              <div className="bg-white rounded-2xl card-shadow overflow-hidden">
                {items.map((item, i) => (
                  <div key={item.code} className={`p-4 ${i > 0 ? 'border-t border-gray-100' : ''}`}>
                    <div className="flex items-center justify-between gap-3">
                      <div className="flex-1">
                        <span className="inline-block bg-gray-100 text-gray-600 text-xs font-bold px-2 py-0.5 rounded mr-2">{item.code}</span>
                        <span className={`text-sm ${patientMode ? 'text-base' : ''}`}>{item.label}</span>
                        {item.type === 'clinic' && !patientMode && <span className="text-xs text-primary-500 ml-2">医院</span>}
                        {item.type === 'patient' && !patientMode && <span className="text-xs text-green-500 ml-2">患者</span>}
                      </div>
                      {item.inputType === 'toggle' && (
                        <button onClick={()=>toggle(item.code)} className={`toggle-btn px-4 py-2 rounded-xl text-sm font-medium transition ${checks[item.code]?'bg-red-500 text-white':'bg-gray-100 text-gray-500'}`}>
                          {checks[item.code] ? '該当' : '非該当'}
                        </button>
                      )}
                      {item.inputType === 'yesno' && (
                        <div className="flex gap-2">
                          <button onClick={()=>setChecks(prev=>({...prev,[item.code]:true}))} className={`toggle-btn px-4 py-2 rounded-xl text-sm font-medium transition ${checks[item.code]===true?'bg-red-500 text-white':'bg-gray-100 text-gray-500'}`}>はい</button>
                          <button onClick={()=>setChecks(prev=>({...prev,[item.code]:false}))} className={`toggle-btn px-4 py-2 rounded-xl text-sm font-medium transition ${checks[item.code]===false?'bg-green-500 text-white':'bg-gray-100 text-gray-500'}`}>いいえ</button>
                        </div>
                      )}
                      {item.inputType === 'body' && !patientMode && (
                        <div className="flex items-center gap-2">
                          <span className="text-xs text-gray-400">{isKaup ? 'カウプ' : 'ローレル'}</span>
                          <span className={`px-3 py-2 rounded-xl text-sm font-medium ${bodyStatus==='normal'?'bg-green-100 text-green-700':bodyStatus==='underweight'?'bg-yellow-100 text-yellow-700':'bg-red-100 text-red-700'}`}>
                            {idx ? (bodyStatus==='normal'?'正常':bodyStatus==='underweight'?'やせ':'肥満') : '未算出'}
                          </span>
                        </div>
                      )}
                      {item.inputType === 'body' && patientMode && (
                        <div className="flex flex-col gap-2 items-end">
                          <div className="flex gap-2">
                            <button onClick={()=>setChecks(prev=>({...prev,C13_patient:'yes'}))} className={`toggle-btn px-3 py-2 rounded-xl text-sm font-medium transition ${checks.C13_patient==='yes'?'bg-red-500 text-white':'bg-gray-100 text-gray-500'}`}>はい</button>
                            <button onClick={()=>setChecks(prev=>({...prev,C13_patient:'no'}))} className={`toggle-btn px-3 py-2 rounded-xl text-sm font-medium transition ${checks.C13_patient==='no'?'bg-green-500 text-white':'bg-gray-100 text-gray-500'}`}>いいえ</button>
                            <button onClick={()=>setChecks(prev=>({...prev,C13_patient:'unknown'}))} className={`toggle-btn px-3 py-2 rounded-xl text-sm font-medium transition ${checks.C13_patient==='unknown'?'bg-primary-500 text-white':'bg-gray-100 text-gray-500'}`}>わからない</button>
                          </div>
                          {checks.C13_patient==='unknown' && (
                            <span className="text-xs text-primary-600 font-medium">→ 医院で測定します</span>
                          )}
                        </div>
                      )}
                    </div>
                    {item.inputType === 'freetext' && (
                      <div className="mt-2 w-full">
                        <textarea
                          value={checks[item.code] || ''}
                          onChange={e=>setChecks(prev=>({...prev,[item.code]:e.target.value}))}
                          className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm"
                          rows={2}
                          placeholder="具体的な問題点を記入してください"
                        />
                      </div>
                    )}
                    {item.inputType === 'habits' && (
                      <div className="mt-3">
                        <div className="text-xs text-gray-400 mb-2">お口に関する癖（指しゃぶり・舌の癖・唇を噛むなど）がありますか？</div>
                        <div className="flex gap-2 mb-2">
                          <button onClick={()=>setChecks(prev=>({...prev, C11_has:true}))} className={`toggle-btn px-4 py-2 rounded-xl text-sm font-medium transition ${checks.C11_has===true?'bg-red-500 text-white':'bg-gray-100 text-gray-500'}`}>はい</button>
                          <button onClick={()=>setChecks(prev=>({...prev, C11_has:false, C11:[]}))} className={`toggle-btn px-4 py-2 rounded-xl text-sm font-medium transition ${checks.C11_has===false?'bg-green-500 text-white':'bg-gray-100 text-gray-500'}`}>いいえ</button>
                        </div>
                        {checks.C11_has === true && (
                          <>
                            <div className="text-xs text-gray-500 mb-2">該当する癖を選んでください（複数選択可）</div>
                            <div className="flex flex-wrap gap-2">
                              {HABITS_LIST.map(h=>(
                                <button key={h} onClick={()=>toggleHabit(h)} className={`px-3 py-2 rounded-lg text-xs font-medium transition ${(checks.C11||[]).includes(h)?'bg-orange-500 text-white':'bg-gray-100 text-gray-600'}`}>{h}</button>
                              ))}
                            </div>
                            {(checks.C11||[]).length > 0 && (
                              <div className="mt-2 text-xs text-orange-600 font-medium">選択中: {(checks.C11||[]).join('、')}</div>
                            )}
                          </>
                        )}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>
          );
        })}

        {!patientMode && (
          <div className="mb-4">
            <h3 className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 px-1">検査値</h3>
            <div className="bg-white rounded-2xl card-shadow p-4 space-y-3">
              {isKaup ? (
                <div>
                  <label className="text-xs text-gray-500 mb-1 block">カウプ指数（6歳未満）</label>
                  <div className={`px-3 py-3 rounded-xl text-base font-medium ${idx ? (bodyStatus==='normal'?'bg-green-50 text-green-700':bodyStatus==='underweight'?'bg-yellow-50 text-yellow-700':'bg-red-50 text-red-700') : 'bg-gray-50 text-gray-400'}`}>
                    {idx ? `${idx}${bodyStatus==='normal'?' （正常）':bodyStatus==='underweight'?' （やせ傾向）':' （肥満傾向）'}` : '体重・身長を入力してください'}
                  </div>
                </div>
              ) : (
                <div>
                  <label className="text-xs text-gray-500 mb-1 block">ローレル指数（6歳以上）</label>
                  <div className={`px-3 py-3 rounded-xl text-base font-medium ${idx ? (bodyStatus==='normal'?'bg-green-50 text-green-700':bodyStatus==='underweight'?'bg-yellow-50 text-yellow-700':'bg-red-50 text-red-700') : 'bg-gray-50 text-gray-400'}`}>
                    {idx ? `${idx}${bodyStatus==='normal'?' （正常）':bodyStatus==='underweight'?' （やせ傾向）':' （肥満傾向）'}` : '体重・身長を入力してください'}
                  </div>
                </div>
              )}
              <div className="flex gap-3">
                <div className="flex-1">
                  <label className="text-xs text-gray-500 mb-1 block">口唇閉鎖力 (N)</label>
                  <input type="number" step="0.1" value={lipForce} onChange={e=>setLipForce(e.target.value)} className="w-full px-3 py-3 bg-gray-50 border border-gray-200 rounded-xl text-base" placeholder="N"/>
                </div>
                <div className="flex-1">
                  <label className="text-xs text-gray-500 mb-1 block">舌圧 (kPa)</label>
                  <input type="number" step="0.1" value={tonguePressure} onChange={e=>setTonguePressure(e.target.value)} className="w-full px-3 py-3 bg-gray-50 border border-gray-200 rounded-xl text-base" placeholder="kPa"/>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ==================== PATIENT DETAIL ====================
function PatientDetail({ patient, assessments, onBack, onEdit, onNewAssessment, onSelectAssessment, onDeleteAssessment, mode }) {
  const [deleteHold, setDeleteHold] = useState(null);
  const [deleteProgress, setDeleteProgress] = useState(0);
  const deleteTimerRef = useRef(null);
  const deleteStartRef = useRef(null);
  const DELETE_DURATION = 2000;
  const handleDeleteStart = (aId) => {
    setDeleteHold(aId);
    deleteStartRef.current = Date.now();
    const animate = () => {
      const elapsed = Date.now() - deleteStartRef.current;
      const progress = Math.min(elapsed / DELETE_DURATION, 1);
      setDeleteProgress(progress);
      if (progress >= 1) { onDeleteAssessment(aId); setDeleteHold(null); setDeleteProgress(0); return; }
      deleteTimerRef.current = requestAnimationFrame(animate);
    };
    deleteTimerRef.current = requestAnimationFrame(animate);
  };
  const handleDeleteEnd = () => {
    if (deleteTimerRef.current) { cancelAnimationFrame(deleteTimerRef.current); deleteTimerRef.current = null; }
    setDeleteHold(null); setDeleteProgress(0);
  };
  const age = calcAge(patient.birthDate);
  const patientAssessments = assessments.filter(a => a.patientId === patient.id).sort((a,b) => new Date(b.date) - new Date(a.date));
  const variant = mode === 'kaika' ? 'kaika' : 'hattatsu';

  return (
    <div className="min-h-screen bg-gray-50">
      <Header title="患者詳細" onBack={onBack} variant={variant} rightAction={
        <button onClick={onEdit} className="toggle-btn text-white font-medium text-sm">編集</button>
      }/>
      <div className="p-4 max-w-2xl mx-auto">
        <div className="bg-white rounded-2xl card-shadow p-4 mb-4">
          <div className="flex justify-between items-start">
            <div>
              <div className="text-xl font-bold text-gray-800">{patient.name}</div>
              <div className="text-sm text-gray-500 mt-1">{age !== null ? `${age}歳` : ''} {patient.sex==='M'?'男':patient.sex==='F'?'女':''}</div>
            </div>
            {patient.patientId && <span className="text-xs text-gray-400">ID: {patient.patientId}</span>}
          </div>
          <div className="grid grid-cols-2 gap-2 mt-3 text-sm">
            <div className="text-gray-500">体重: <span className="text-gray-800">{patient.weight || '-'} kg</span></div>
            <div className="text-gray-500">身長: <span className="text-gray-800">{patient.height || '-'} cm</span></div>
            <div className="text-gray-500">保護者: <span className="text-gray-800">{patient.guardianName || '-'}</span></div>
            <div className="text-gray-500">担当医: <span className="text-gray-800">{patient.doctor || '-'}</span></div>
          </div>
        </div>

        <button onClick={onNewAssessment} className={`w-full ${variant === 'kaika' ? 'bg-kaika-600' : 'bg-primary-600'} text-white py-4 rounded-2xl font-bold text-base mb-4 active:opacity-90 transition card-shadow`}>
          ＋ 新しい評価を開始
        </button>

        <h3 className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 px-1">評価履歴</h3>
        {patientAssessments.length === 0 ? (
          <div className="bg-white rounded-2xl card-shadow p-8 text-center text-gray-400 text-sm">まだ評価記録がありません</div>
        ) : patientAssessments.map(a => {
          let checkedCount = 0;
          if (mode === 'kaika') {
            checkedCount = Object.values(a.kaikaItems||{}).filter(item => item.positive).length;
          } else {
            checkedCount = Object.entries(a.checks).filter(([k,v])=>{
              if(k==='C11') return v&&v.length>0;
              if(k==='C13') return v==='underweight'||v==='overweight';
              if(k==='C17') return v&&v.length>0;
              return v===true;
            }).length;
          }
          return (
            <div key={a.id} className="flex items-center gap-2 mb-3">
              <button onClick={()=>onSelectAssessment(a)} className="flex-1 text-left bg-white rounded-2xl p-4 card-shadow active:bg-gray-50 transition">
                <div className="flex justify-between items-center">
                  <div className="text-sm font-medium text-gray-800">{formatDate(a.date)}</div>
                  <div className="flex items-center gap-2">
                    {a.plans && Object.keys(a.plans).length > 0 && <span className="text-green-600 text-xs font-medium">保存済み</span>}
                    <span className={`text-xs font-bold px-2 py-1 rounded-lg ${variant === 'kaika' ? 'bg-kaika-50 text-kaika-600' : 'bg-red-50 text-red-600'}`}>該当 {checkedCount}項目</span>
                  </div>
                </div>
              </button>
              <button
                onTouchStart={()=>handleDeleteStart(a.id)} onTouchEnd={handleDeleteEnd} onTouchCancel={handleDeleteEnd}
                onMouseDown={()=>handleDeleteStart(a.id)} onMouseUp={handleDeleteEnd} onMouseLeave={handleDeleteEnd}
                className="relative overflow-hidden toggle-btn px-3 py-3 rounded-xl text-xs font-medium bg-red-50 text-red-500 border border-red-200 select-none shrink-0"
                style={{WebkitUserSelect:'none',userSelect:'none'}}
              >
                {deleteHold === a.id && deleteProgress > 0 && (
                  <div className="absolute inset-0 bg-red-500 opacity-30" style={{width:`${deleteProgress*100}%`,transition:'none'}}/>
                )}
                <span className="relative z-10">{deleteHold === a.id && deleteProgress > 0 ? '削除中...' : '削除'}</span>
              </button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ==================== MANAGEMENT PLAN ====================
function ManagementPlan({ patient, assessment, onSave, onBack, onPrint, mode }) {
  const isKaika = mode === 'kaika';
  const [plans, setPlans] = useState(() => {
    const initial = {};
    if (isKaika) {
      Object.entries(assessment.kaikaItems||{}).forEach(([code, item]) => {
        if (item.positive && PLAN_TEMPLATES_KAIKA[code]) {
          initial[code] = assessment.plans?.[code] || { ...PLAN_TEMPLATES_KAIKA[code] };
        }
      });
    } else {
      Object.entries(assessment.checks).forEach(([code, val]) => {
        const isChecked = code === 'C11' ? (val && val.length > 0) : code === 'C13' ? (val === 'underweight' || val === 'overweight') : code === 'C17' ? (val && val.length > 0) : val === true;
        if (isChecked && PLAN_TEMPLATES_HATTATSU[code]) {
          initial[code] = assessment.plans?.[code] || { ...PLAN_TEMPLATES_HATTATSU[code] };
        }
      });
    }
    return initial;
  });
  const [overallPlan, setOverallPlan] = useState(() => {
    if (assessment.overallPlan) return assessment.overallPlan;
    const codes = Object.keys(plans);
    const lines = [];
    const has = (arr) => arr.some(c => codes.includes(c));

    if (isKaika) {
      if (has(['K1','K2','K3'])) lines.push('口腔衛生と咀嚼機能の改善を行います。');
      if (has(['K4','K5'])) lines.push('舌口唇機能と舌圧の改善訓練を実施します。');
      if (has(['K6','K7'])) lines.push('咀嚼・嚥下機能の評価と訓練を行います。');
      lines.push('3か月ごとに再評価を行います。');
    } else {
      if (has(['C1','C2','C3','C4','C5','C6'])) lines.push('噛む機能の改善と咬合育成を行います。');
      if (has(['C7','C9','C12'])) lines.push('舌の機能訓練（MFT）を実施します。');
      if (has(['C10'])) lines.push('口唇閉鎖力の改善訓練を行います。');
      if (has(['C14','C15','C16'])) lines.push('鼻呼吸への改善指導を行い、必要に応じて耳鼻科受診のご案内や上あごを広げる装置をご提案します。');
      if (has(['C11'])) lines.push('口腔習癖の除去指導を行います。');
      if (has(['C8'])) lines.push('食事・間食指導を行います。');
      if (has(['C13'])) lines.push('栄養指導と体格管理を行います。');
      lines.push('3か月ごとに再評価を行います。');
    }
    return lines.map((l,i) => `${i+1}. ${l}`).join('\n');
  });
  const [notes, setNotes] = useState(assessment.notes || '');
  const [saveMsg, setSaveMsg] = useState(false);

  const updatePlan = (code, field, value) => {
    setPlans(prev => ({...prev, [code]: {...prev[code], [field]: value}}));
  };

  const handleSave = () => {
    onSave({ ...assessment, plans, overallPlan, notes });
    setSaveMsg(true);
    setTimeout(() => setSaveMsg(false), 2500);
  };

  const checkedCodes = Object.keys(plans).sort((a,b) => {
    const numA = parseInt(a.replace(/[KC]/,''));
    const numB = parseInt(b.replace(/[KC]/,''));
    return numA - numB;
  });

  const ITEMS = isKaika ? KAIKA_ITEMS : CHECK_ITEMS_HATTATSU;
  const variant = mode === 'kaika' ? 'kaika' : 'hattatsu';
  const title = isKaika ? '口腔機能低下症 管理計画書' : '口腔機能発達不全症 管理計画書';

  return (
    <div className="min-h-screen bg-gray-50">
      <Header title={title} onBack={onBack} variant={variant} rightAction={
        <div className="flex gap-2">
          <LongPressButton onAction={handleSave} className={`text-white px-4 py-2 rounded-xl font-medium text-sm ${variant === 'kaika' ? 'bg-kaika-600' : 'bg-primary-600'}`} label="保存"/>

          <button onClick={()=>{handleSave();onPrint();}} className="toggle-btn bg-green-600 text-white px-4 py-2 rounded-xl font-medium text-sm">PDF出力</button>
        </div>
      }/>
      {saveMsg && (
        <div className="fixed top-16 left-1/2 transform -translate-x-1/2 bg-green-600 text-white px-6 py-3 rounded-2xl shadow-lg z-50 text-sm font-medium animate-pulse">
          クラウドにデータが保存されました
        </div>
      )}
      <div className="p-4 max-w-2xl mx-auto">
        <div className={`rounded-xl p-3 mb-4 text-sm ${variant === 'kaika' ? 'bg-kaika-50 text-kaika-700' : 'bg-red-50 text-red-700'}`}>
          該当項目: <span className="font-bold">{checkedCodes.length}項目</span>（{checkedCodes.join(', ')}）

        {checkedCodes.length === 0 ? (
          <div className="bg-white rounded-2xl card-shadow p-8 text-center text-gray-400">
            <p>該当する評価項目がありません</p>
          </div>
        ) : checkedCodes.map(code => {
          const item = ITEMS.find(i=>i.code===code);
          const plan = plans[code];
          return (
            <div key={code} className="bg-white rounded-2xl card-shadow mb-4 overflow-hidden">
              <div className={`text-white px-4 py-2 text-sm font-bold ${variant === 'kaika' ? 'bg-kaika-600' : 'bg-primary-600'}`}>
                {code} {item?.label}
              </div>
              <div className="p-4 space-y-3">
                <div>
                  <label className="text-xs font-medium text-gray-500 block mb-1">問題点</label>
                  <textarea value={plan.problem} onChange={e=>updatePlan(code,'problem',e.target.value)}
                    className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm resize-none" rows={2}/>
                </div>
                {plan.shortTerm !== undefined ? (
                  <>
                    <div>
                      <label className="text-xs font-medium text-gray-500 block mb-1">短期計画</label>
                      <textarea value={plan.shortTerm} onChange={e=>updatePlan(code,'shortTerm',e.target.value)}
                        className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm resize-none" rows={2}/>
                    </div>
                    <div>
                      <label className="text-xs font-medium text-gray-500 block mb-1">中長期計画</label>
                      <textarea value={plan.longTerm} onChange={e=>updatePlan(code,'longTerm',e.target.value)}
                        className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm resize-none" rows={2}/>
                    </div>
                  </>
                ) : (
                  <div>
                    <label className="text-xs font-medium text-gray-500 block mb-1">管理計画</label>
                    <textarea value={plan.plan} onChange={e=>updatePlan(code,'plan',e.target.value)}
                      className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm resize-none" rows={3}/>
                  </div>
                )}
              </div>
            </div>
          );
        })}

        <div className="bg-white rounded-2xl card-shadow mb-4 overflow-hidden">
          <div className={`text-white px-4 py-2 text-sm font-bold ${variant === 'kaika' ? 'bg-kaika-700' : 'bg-gray-700'}`}>総合管理計画</div>
          <div className="p-4">
            <textarea value={overallPlan} onChange={e=>setOverallPlan(e.target.value)}
              className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm resize-none" rows={6}/>

        </div>

        <div className="bg-white rounded-2xl card-shadow mb-4 p-4">
          <label className="text-xs font-medium text-gray-500 block mb-1">追加所見・メモ</label>

        </div>
      </div>
    </div>
  );
}

// ==================== PRINT VIEW ====================
function PrintView({ patient, assessment, onClose, mode }) {

  const plans = assessment.plans || {};
  const checkedCodes = Object.keys(plans).sort((a,b) => {
    const numA = parseInt(a.replace(/[KC]/,''));
    const numB = parseInt(b.replace(/[KC]/,''));

            <div style={{border:'2px solid #374151',borderRadius:'8px',padding:'12px',marginBottom:'12px'}}>
              <h3 style={{fontSize:'13px',fontWeight:'bold',marginBottom:'8px',color:'#374151'}}>総合管理計画</h3>
              <div style={{fontSize:'12px',whiteSpace:'pre-line'}}>{assessment.overallPlan || ''}</div>

// ==================== APP ====================
function App() {
  const [pin, setPin] = useState(null);
  const [mode, setMode] = useState(null);
  const [data, setData] = useState({ patients: [], assessments: [] });
  const [ready, setReady] = useState(false);
  const [page, setPage] = useState('home');
  const [currentPatient, setCurrentPatient] = useState(null);
  const [currentAssessment, setCurrentAssessment] = useState(null);
  const [editingPatient, setEditingPatient] = useState(null);
  const firestoreListenersRef = useRef([]);

  const handleAuth = async (enteredPin) => {
    setPin(enteredPin);
    const legacy = getLegacyData();
    let initialData = { patients: [], assessments: [] };

    if (legacy && (legacy.patients.length > 0 || legacy.assessments.length > 0)) {
      initialData = legacy;
      initialData.patients.forEach(p => { if (!p.mode) p.mode = 'hattatsu'; });
      await encryptData(legacy, enteredPin);
      localStorage.removeItem('oralFuncData');
    } else {
      try { initialData = await decryptData(enteredPin); } catch { initialData = { patients: [], assessments: [] }; }
    }

    if (firebaseReady && db) {
      const firestoreData = await loadDataFromFirestore();
      if (firestoreData && (firestoreData.patients.length > 0 || firestoreData.assessments.length > 0)) {
        initialData = firestoreData;
      }
    }

    setData(initialData);
    setReady(true);
  };

  useEffect(() => {
    if (!pin || !ready || !firebaseReady || !db) return;
    firestoreListenersRef.current.forEach(unsubscribe => unsubscribe());
    firestoreListenersRef.current = [];
    const unsubPatients = db.collection('patients').onSnapshot(snapshot => {
      const patients = [];
      snapshot.forEach(doc => patients.push(doc.data()));
      setData(prev => ({ ...prev, patients }));
    }, error => console.warn('Error listening to patients:', error));
    const unsubAssessments = db.collection('assessments').onSnapshot(snapshot => {
      const assessments = [];
      snapshot.forEach(doc => assessments.push(doc.data()));
      setData(prev => ({ ...prev, assessments }));
    }, error => console.warn('Error listening to assessments:', error));
    firestoreListenersRef.current = [unsubPatients, unsubAssessments];
    return () => {
      firestoreListenersRef.current.forEach(unsubscribe => unsubscribe());
    };
  }, [pin, ready]);

  useEffect(() => { if (pin && ready) { encryptData(data, pin); } }, [data, pin, ready]);

  if (!pin) return <PinScreen onAuth={handleAuth}/>;
  if (!ready) return <div className="min-h-screen flex items-center justify-center"><p className="text-gray-400">読み込み中...</p></div>;
  if (!mode) return <HomeScreen onSelectMode={m => { setMode(m); setPage('list'); }}/>;

  const savePatient = (p) => {
    if (!p.mode) p.mode = mode;
    setData(prev => {
      const exists = prev.patients.find(x => x.id === p.id);
      if (exists) {
        return { ...prev, patients: prev.patients.map(x => x.id === p.id ? p : x) };
      }
      return { ...prev, patients: [...prev.patients, p] };
    });
    savePatientToFirestore(p);
    setCurrentPatient(p);
    setPage('detail');
  };

  const saveAssessment = (a) => {
    setData(prev => {
      const exists = prev.assessments.find(x => x.id === a.id);
      if (exists) {
        return { ...prev, assessments: prev.assessments.map(x => x.id === a.id ? a : x) };
      }
      return { ...prev, assessments: [...prev.assessments, a] };
    });
    saveAssessmentToFirestore(a);
    setCurrentAssessment(a);
    setPage('plan');
  };

  const savePlan = (a) => {
    setData(prev => ({
      ...prev,
      assessments: prev.assessments.map(x => x.id === a.id ? a : x)
    }));
    saveAssessmentToFirestore(a);
    setCurrentAssessment(a);
  };

  const deleteAssessment = (aId) => {
    setData(prev => ({
      ...prev,
      assessments: prev.assessments.filter(a => a.id !== aId)
    }));
    try { db.collection('assessments').doc(aId).delete(); } catch(e) { console.log('Firestore delete error', e); }
  };

  const handleRestore = async (backupData) => {
    backupData.patients.forEach(p => { if (!p.mode) p.mode = 'hattatsu'; });
    setData({ patients: backupData.patients, assessments: backupData.assessments });
    if (firebaseReady && db) {
      for (const p of backupData.patients) {
        await savePatientToFirestore(p);
      }
      for (const a of backupData.assessments) {
        await saveAssessmentToFirestore(a);
      }
    }
  };

  const deletePatient = (id) => {
    if(!confirm('この患者データを削除しますか？')) return;
    setData(prev => ({
      patients: prev.patients.filter(p => p.id !== id),
      assessments: prev.assessments.filter(a => a.patientId !== id)
    }));
    deletePatientFromFirestore(id);
    setPage('list');
  };

  if (page === 'print' && currentPatient && currentAssessment) {
    return <PrintView patient={currentPatient} assessment={currentAssessment} onClose={()=>setPage('plan')} mode={mode}/>;
  }

  if (page === 'list') {
    return <PatientList patients={data.patients} assessments={data.assessments} mode={mode}
      onSelect={p=>{setCurrentPatient(p);setPage('detail');}}
      onAdd={()=>{setEditingPatient(null);setPage('form');}}
      onRestore={handleRestore}
      onHome={()=>{setMode(null);setPage('home');}}/>;
  }

  if (page === 'form') {
    return <PatientForm patient={editingPatient} mode={mode} onSave={savePatient} onCancel={()=>{
      if(currentPatient) setPage('detail'); else setPage('list');
    }}/>;
  }

  if (page === 'detail' && currentPatient) {
    return <PatientDetail patient={currentPatient} assessments={data.assessments} mode={mode}
      onBack={()=>setPage('list')}
      onEdit={()=>{setEditingPatient(currentPatient);setPage('form');}}
      onNewAssessment={()=>{setCurrentAssessment(null);setPage('assessment');}}
      onSelectAssessment={a=>{setCurrentAssessment(a);setPage('plan');}}
      onDeleteAssessment={deleteAssessment}/>;
  }

  if (page === 'assessment' && currentPatient) {
    if (mode === 'kaika') {
      return <KaikaAssessmentForm patient={currentPatient} existingAssessment={currentAssessment}
        onSave={saveAssessment}
        onCancel={()=>setPage('detail')}/>;
    } else {
      return <HattatsuAssessmentForm patient={currentPatient} existingAssessment={currentAssessment}
        onSave={saveAssessment}
        onCancel={()=>setPage('detail')}/>;
    }
  }

  if (page === 'plan' && currentPatient && currentAssessment) {
    return <ManagementPlan patient={currentPatient} assessment={currentAssessment} mode={mode}
      onSave={savePlan} onBack={()=>setPage('detail')} onPrint={()=>setPage('print')}/>;
  }

  return <PatientList patients={data.patients} assessments={data.assessments} mode={mode}
    onSelect={p=>{setCurrentPatient(p);setPage('detail');}}
    onAdd={()=>{setEditingPatient(null);setPage('form');}}
    onRestore={handleRestore}
    onHome={()=>{setMode(null);setPage('home');}}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
